<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spike Explorer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=DM+Sans:wght@400;500;600;700&display=swap');
  :root {
    --bg0:#0a0e17;--bg1:#111827;--bg2:#1a2236;--bg3:#1e2a42;
    --bdr:#2a3654;--bdr-a:#4a6fa5;
    --t1:#e2e8f0;--t2:#8899b4;--t3:#5a6b85;
    --acc:#5ba4f5;--acc-d:#2d5a9e;--acc-g:rgba(91,164,245,0.15);
    --mono:'JetBrains Mono',monospace;--sans:'DM Sans',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:var(--sans);background:var(--bg0);color:var(--t1);min-height:100vh;display:flex;flex-direction:column;}

  .header{display:flex;align-items:center;gap:16px;padding:10px 20px;background:var(--bg1);border-bottom:1px solid var(--bdr);flex-shrink:0;}
  .header h1{font-family:var(--mono);font-size:15px;font-weight:500;color:var(--acc);}
  .header .fi{font-family:var(--mono);font-size:12px;color:var(--t2);margin-left:auto;}

  button{font-family:var(--mono);font-size:12px;font-weight:500;padding:6px 14px;border:1px solid var(--bdr);border-radius:4px;background:var(--bg2);color:var(--t1);cursor:pointer;transition:all .15s;white-space:nowrap;}
  button:hover{background:var(--bg3);border-color:var(--bdr-a);}
  button.primary{background:var(--acc-d);border-color:var(--acc);color:white;}

  .toolbar{display:flex;align-items:center;gap:14px;padding:8px 20px;background:var(--bg1);border-bottom:1px solid var(--bdr);flex-wrap:wrap;flex-shrink:0;}
  .toolbar label{font-family:var(--mono);font-size:11px;color:var(--t2);display:flex;align-items:center;gap:6px;}
  .toolbar select,.toolbar input[type=number]{font-family:var(--mono);font-size:11px;background:var(--bg2);color:var(--t1);border:1px solid var(--bdr);border-radius:3px;padding:3px 6px;outline:none;-moz-appearance:textfield;}
  .toolbar input[type=number]{width:60px;}
  .toolbar input[type=number]::-webkit-outer-spin-button,.toolbar input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
  .toolbar select:focus,.toolbar input:focus{border-color:var(--acc);}
  .toolbar .status{font-family:var(--mono);font-size:11px;color:var(--t3);margin-left:auto;}
  .toolbar-analysis{padding:6px 20px;gap:10px;}
  .toolbar-analysis .toolbar-label{font-family:var(--mono);font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;}
  .toolbar-filters{padding:6px 20px;gap:8px;}
  .toolbar-filters .toolbar-label{font-family:var(--mono);font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;}
  .filter-chips{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
  .chip{display:inline-flex;align-items:center;gap:4px;padding:2px 4px 2px 8px;background:var(--bg2);border:1px solid var(--bdr);border-radius:11px;font-family:var(--mono);font-size:11px;color:var(--t1);}
  .chip .chip-key{color:var(--t2);}
  .chip .chip-val{color:var(--acc);font-weight:500;}
  .chip select.chip-val{font-family:var(--mono);font-size:11px;color:var(--acc);font-weight:500;background:transparent;border:none;outline:none;padding:0 2px;cursor:pointer;-webkit-appearance:none;-moz-appearance:none;appearance:none;}
  .chip select.chip-val:hover{background:var(--bg3);border-radius:3px;}
  .chip select.chip-val option{color:var(--t1);background:var(--bg2);font-weight:400;}
  .chip .chip-x{background:transparent;border:none;color:var(--t3);font-size:14px;line-height:1;cursor:pointer;padding:0 4px;border-radius:50%;}
  .chip .chip-x:hover{color:#f87171;background:transparent;}
  .chip-add{font-family:var(--mono);font-size:11px;padding:4px 10px;}
  .chip-or{font-family:var(--mono);font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;padding:0 2px;align-self:center;}
  .chip-draft{display:inline-flex;align-items:center;gap:4px;padding:3px 4px 3px 8px;background:var(--bg2);border:1px dashed var(--bdr-a);border-radius:11px;}
  .chip-draft select{font-family:var(--mono);font-size:11px;background:var(--bg1);color:var(--t1);border:1px solid var(--bdr);border-radius:3px;padding:2px 4px;outline:none;}
  .chip-draft .draft-eq{color:var(--t2);}
  .chip-draft .draft-go{font-size:11px;padding:2px 8px;}
  .chip-draft .draft-cancel{background:transparent;border:none;color:var(--t3);cursor:pointer;font-size:14px;line-height:1;padding:0 4px;}
  .chip-draft .draft-cancel:hover{color:#f87171;}
  .filter-status{font-family:var(--mono);font-size:11px;color:var(--t3);margin-left:auto;}

  .dropzone{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;border:2px dashed var(--bdr);border-radius:12px;margin:40px;}
  .dropzone.dragover{border-color:var(--acc);background:var(--acc-g);}
  .dropzone svg{opacity:.3;}
  .dropzone p{font-family:var(--mono);font-size:13px;color:var(--t3);}
  .dropzone .hint{font-size:11px;opacity:.6;}

  .matrix-wrap{display:none;flex:1;overflow:auto;padding:14px;background:var(--bg0);}
  .matrix-wrap.active{display:block;}
  .matrix-wrap canvas{display:block;background:var(--bg1);border:1px solid var(--bdr);border-radius:6px;}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;padding:18px;}
  .panel{background:var(--bg1);border:1px solid var(--bdr);border-radius:6px;cursor:pointer;display:flex;flex-direction:column;transition:border-color .12s;overflow:hidden;}
  .panel:hover{border-color:var(--acc);}
  .panel-head{padding:6px 10px;font-family:var(--mono);font-size:11px;color:var(--t1);display:flex;align-items:baseline;gap:8px;border-bottom:1px solid var(--bdr);}
  .panel-head .v{font-weight:600;color:var(--acc);}
  .panel-head .n{color:var(--t3);font-size:10px;margin-left:auto;}
  .panel-canvas{display:block;width:100%;background:var(--bg0);}

  .drill{display:none;flex-direction:column;flex:1;padding:0;background:var(--bg0);}
  .drill.active{display:flex;}
  .drill-head{display:flex;align-items:baseline;gap:14px;padding:10px 20px;background:var(--bg1);border-bottom:1px solid var(--bdr);}
  .drill-head h2{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--acc);}
  .drill-head .meta{font-family:var(--mono);font-size:11px;color:var(--t2);}
  .drill-body{flex:1;overflow:auto;padding:14px;}
  .drill-canvas-wrap{background:var(--bg1);border:1px solid var(--bdr);border-radius:6px;}

  .empty{color:var(--t3);font-family:var(--mono);font-size:12px;padding:40px;text-align:center;}

  .analysis-panel{display:none;background:var(--bg1);border-top:1px solid var(--bdr);padding:14px 20px;font-family:var(--mono);font-size:12px;color:var(--t1);max-height:65vh;overflow:auto;}
  .analysis-panel.active{display:block;}
  .analysis-panel h3{margin:0 0 8px 0;font-size:12px;color:var(--acc);font-weight:500;}
  .analysis-panel table{border-collapse:collapse;font-size:11px;margin-top:6px;}
  .analysis-panel th,.analysis-panel td{padding:3px 12px 3px 0;text-align:left;color:var(--t1);}
  .analysis-panel th{color:var(--t2);font-weight:400;border-bottom:1px solid var(--bdr);}
  .analysis-panel .muted{color:var(--t2);}
  .analysis-panel .sig{color:var(--acc);}
  .analysis-panel .row{display:flex;align-items:baseline;gap:18px;margin-bottom:4px;}
  .analysis-panel .close{float:right;background:transparent;border:none;color:var(--t2);cursor:pointer;font-size:14px;padding:0 4px;}
  .analysis-panel .close:hover{color:var(--t1);background:transparent;}
  .analysis-panel .err{color:#f87171;}
</style>
</head>
<body>

<div class="header">
  <h1>Spike Explorer</h1>
  <button id="btnOpen" class="primary">Open</button>
  <input type="file" id="fileInput" accept=".dg,.dgz" multiple style="display:none">
  <span class="fi" id="fileInfo">Drop a .spikes.dgz file</span>
</div>

<div class="toolbar" id="toolbar" style="display:none;">
  <label>view <select id="viewMode"><option value="summary">2D summary</option><option value="matrix">matrix (1 dim)</option><option value="overlay">overlay</option><option value="spatial">spatial map</option></select></label>
  <label>rasts by <select id="rastsBy"></select></label>
  <label id="filterLabel">
    <span id="filterLabelText">filter</span>
    <select id="filterBy"></select>
    <span id="filterEquals">=</span>
    <select id="filterValue"></select>
  </label>
  <label id="spatialXLabel" style="display:none;">x <select id="spatialX"></select></label>
  <label id="spatialYLabel" style="display:none;">y <select id="spatialY"></select></label>
  <label id="flipYLabel" style="display:none;"><input type="checkbox" id="flipY"> flip Y</label>
  <label>align <select id="alignTo"></select></label>
  <label>window <input type="number" id="winPre" step="50"> – <input type="number" id="winPost" step="50"> ms</label>
  <label>depth <input type="number" id="depthLo" step="100"> – <input type="number" id="depthHi" step="100"> µm</label>
  <button id="btnReset">Reset depth</button>
  <label><input type="checkbox" id="perPanelScale"> per-panel scale</label>
  <span class="status" id="status"></span>
</div>
<div class="toolbar toolbar-filters" id="toolbarFilters" style="display:none;">
  <span class="toolbar-label">filter</span>
  <div id="filterChips" class="filter-chips"></div>
  <button id="btnAddFilter" class="chip-add" title="Add a column = value subset filter">+ add filter</button>
  <span id="filterStatus" class="filter-status"></span>
</div>
<div class="toolbar toolbar-analysis" id="toolbarAnalysis" style="display:none;">
  <span class="toolbar-label">analysis</span>
  <button id="btnAnalyzeANOVA" title="ANOVA on per-trial spike count in the current window" style="display:none;">ANOVA</button>
  <button id="btnAnalyzeOverTime" title="η² over time: when does selectivity emerge?" style="display:none;">η² over time</button>
  <button id="btnCopyPython" title="Copy a Python snippet that reproduces the current view">Copy as Python</button>
</div>

<div class="dropzone" id="dropZone">
  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
  </svg>
  <p>Drop one or more .spikes.dgz files here</p>
  <p class="hint">or click Open · drop multiple complementary banks to combine heatmaps</p>
</div>

<div class="matrix-wrap" id="matrixWrap"><canvas id="matrixCanvas"></canvas></div>
<div class="grid" id="grid" style="display:none;"></div>

<div class="analysis-panel" id="analysisPanel">
  <button class="close" id="btnAnalysisClose" title="Close">×</button>
  <div id="analysisContent"></div>
</div>

<div class="drill" id="drill">
  <div class="drill-head">
    <button id="btnBack">← Back</button>
    <h2 id="drillTitle"></h2>
    <span class="meta" id="drillMeta"></span>
  </div>
  <div class="drill-body">
    <div class="drill-canvas-wrap"><canvas id="drillCanvas"></canvas></div>
  </div>
</div>

<script src="js/dg_reader.js"></script>
<script src="js/pyodide_analysis.js?v=2"></script>
<script>
// ═════════════════════════════════════════════════════════════════════
// Spike Explorer — overlay rasters across trials of the same condition.
//
// Loads a .spikes.dgz produced by the neuropixel Tcl package (schema v1),
// auto-discovers candidate group-by columns + alignment events, and shows
// one (time × depth) overlay panel per distinct value of the chosen
// group-by column. Click a panel to drill into individual trials.
//
// Conventions (from DATA_SCHEMA.md):
//  - spike_times: ms from obs-period start (same clock as stim_on).
//  - spike_src_trial[i]: index of the canonical trial holding sublists.
//  - unit_list_*[0]: per-unit metadata (id, depth, x, amp, snr, fr, presence).
//  - spike_missing_value: float sentinel (default -1.0) for missing.
// ═════════════════════════════════════════════════════════════════════

const App = {
  // Loaded data
  // sources is the source of truth — an array of one or more loaded files,
  // each with its own dg + per-source metadata. The dg/filename/ntrials/
  // unitLookup/spikeMissing fields below mirror sources[0] (the "primary"
  // source) so single-source code paths (matrix, overlay, drilldown) keep
  // working unchanged. dataDepthMin/Max are the UNION across all sources.
  sources: [],            // [{dg, filename, ntrials, unitLookup,
                          //    spikeMissing, dataDepthMin, dataDepthMax}, …]
  dg: null,
  filename: '',
  ntrials: 0,

  // Spike metadata cache (mirrors sources[0])
  unitLookup: null,       // Map<unit_id, {depth, snr, ...}>
  spikeMissing: -1.0,
  dataDepthMin: 0,
  dataDepthMax: 1,

  // UI / view state
  mode: 'summary',        // 'summary' | 'matrix' | 'overlay' | 'spatial'
  rastsBy: '',
  filterBy: '',           // '' = no secondary axis (2D summary uses this as 'rows')
  filterValue: '',        // string form of the chosen value (matrix/overlay views)
  // Y-axis flip for 2D summary view: many of our spatial columns
  // (*_y, *_pos_y, etc.) use "up is positive" but ascending-sort renders
  // small values at top, so up ends up at the bottom. Toggle inverts row
  // order for any 2D summary; auto-defaults on for *_y filter columns.
  flipY: false,
  flipYAutoApplied: false,
  // Spatial map view: x/y are scalar numeric columns whose unique value
  // pairs define real (x, y) sampling locations (e.g. patch_x/patch_y,
  // stim_x/stim_y). Heatmaps are placed at their real locations rather
  // than on a regular grid.
  spatialX: '',
  spatialY: '',
  // Subset filters (apply to all views + analyses uniformly). Each entry
  // is {col, value:String}. AND together: a trial passes iff every chip
  // matches. A chip referencing a column a source lacks → all that
  // source's trials fail (conservative: filter intent is "only these").
  filters: [],
  alignTo: '',
  winPre: -100,
  winPost: 400,
  depthLo: 0,
  depthHi: 1,
  perPanelScale: false,

  // Computed per render
  panels: [],            // [{value, trials: [...indices]}]
  dpr: window.devicePixelRatio || 1,

  // ─── Init ───
  init() {
    document.getElementById('btnOpen').addEventListener('click',
      () => document.getElementById('fileInput').click());
    document.getElementById('fileInput').addEventListener('change',
      e => this._loadFiles(Array.from(e.target.files)));

    const pickDGFiles = list =>
      Array.from(list).filter(f => f.name.endsWith('.dg') || f.name.endsWith('.dgz'));

    const dz = document.getElementById('dropZone');
    ['dragenter','dragover'].forEach(ev =>
      dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.add('dragover'); }));
    ['dragleave','drop'].forEach(ev =>
      dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.remove('dragover'); }));
    dz.addEventListener('drop', e => {
      e.preventDefault();
      const files = pickDGFiles(e.dataTransfer.files);
      if (files.length) this._loadFiles(files);
    });
    document.body.addEventListener('dragover', e => e.preventDefault());
    document.body.addEventListener('drop', e => {
      e.preventDefault();
      const files = pickDGFiles(e.dataTransfer.files);
      if (files.length) this._loadFiles(files);
    });

    // Toolbar bindings
    document.getElementById('viewMode').addEventListener('change', e => {
      this.mode = e.target.value;
      this._invalidateAnalysisPanel();
      if (this.mode === 'summary') this._ensureFilterPicked();
      this._updateToolbarLabels();
      this.exitDrilldown();
      this.refresh();
    });
    document.getElementById('rastsBy').addEventListener('change', () => {
      this.rastsBy = document.getElementById('rastsBy').value;
      this.populateFilterDropdowns();
      // If we're in summary mode and the rastsBy change invalidated the
      // existing filterBy (e.g. user picked the same column for both),
      // re-pick a sensible row dimension automatically.
      if (this.mode === 'summary') this._ensureFilterPicked();
      this.onControlsChanged();
    });
    document.getElementById('filterBy').addEventListener('change', () => {
      this.filterBy = document.getElementById('filterBy').value;
      // User explicitly changed filterBy: re-evaluate the auto flip-Y
      // default for the new column. Only override the user's previous
      // manual choice if we had set it ourselves.
      this._maybeAutoFlipY();
      this.populateFilterValueDropdown();
      this.onControlsChanged();
    });
    document.getElementById('flipY').addEventListener('change', e => {
      this.flipY = e.target.checked;
      this.flipYAutoApplied = false;  // user took manual control
      this.refresh();
    });
    document.getElementById('spatialX').addEventListener('change', e => {
      this.spatialX = e.target.value;
      this.onControlsChanged();
    });
    document.getElementById('spatialY').addEventListener('change', e => {
      this.spatialY = e.target.value;
      this.onControlsChanged();
    });
    document.getElementById('filterValue').addEventListener('change', () => {
      this.filterValue = document.getElementById('filterValue').value;
      this.onControlsChanged();
    });
    document.getElementById('alignTo').addEventListener('change', () => this.onControlsChanged());
    document.getElementById('perPanelScale').addEventListener('change', e => {
      this.perPanelScale = e.target.checked;
      this.refresh();
    });
    for (const id of ['winPre','winPost','depthLo','depthHi']) {
      const el = document.getElementById(id);
      el.addEventListener('change', () => this.onControlsChanged());
      el.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); el.blur(); } });
    }
    document.getElementById('btnReset').addEventListener('click', () => {
      this.depthLo = Math.floor(this.dataDepthMin / 100) * 100;
      this.depthHi = Math.ceil(this.dataDepthMax / 100) * 100;
      this.syncDepthInputs();
      this._invalidateAnalysisPanel();
      this.refresh();
    });
    document.getElementById('btnBack').addEventListener('click', () => this.exitDrilldown());
    document.getElementById('btnCopyPython').addEventListener('click',
      () => this._copyPythonSnippet());
    document.getElementById('btnAnalyzeANOVA').addEventListener('click',
      () => this._runANOVA());
    document.getElementById('btnAnalyzeOverTime').addEventListener('click',
      () => this._runSelectivityOverTime());
    document.getElementById('btnAddFilter').addEventListener('click',
      () => this._addFilterDraft());
    document.getElementById('btnAnalysisClose').addEventListener('click',
      () => document.getElementById('analysisPanel').classList.remove('active'));
    window.addEventListener('pyodide-analysis:status', e => {
      this._flashStatus(`pyodide: ${e.detail.message}`);
    });

    // Click on the matrix canvas — used for summary-mode row drill-in.
    document.getElementById('matrixCanvas').addEventListener('click',
      e => this._onMatrixCanvasClick(e));
    document.getElementById('matrixCanvas').addEventListener('mousemove', e => {
      const c = document.getElementById('matrixCanvas');
      c.style.cursor = (this.mode === 'summary' && this._summaryHit) ? 'pointer' : 'default';
    });

    // ?file= URL param
    const params = new URLSearchParams(window.location.search);
    if (params.get('file')) this.loadURL(params.get('file'));
  },

  // ─── File loading (single or multiple) ───
  async loadURL(url) {
    try {
      const resp = await fetch(url);
      if (!resp.ok) throw new Error(`${resp.status} ${resp.statusText}`);
      const buf = await resp.arrayBuffer();
      const name = url.split('/').pop() || 'data.dg';
      await this._adoptSources([await this._buildSourceFromBuffer(buf, name)]);
    } catch (err) {
      console.error(err);
      document.getElementById('fileInfo').textContent = 'Error: ' + err.message;
    }
  },

  async _loadFiles(files) {
    if (!files || files.length === 0) return;
    try {
      const sources = [];
      for (const f of files) {
        const buf = await f.arrayBuffer();
        const src = await this._buildSourceFromBuffer(buf, f.name);
        if (src) sources.push(src);
      }
      if (sources.length === 0) {
        document.getElementById('fileInfo').textContent =
          'no spike-augmented files in selection (need *.spikes.dgz)';
        return;
      }
      await this._adoptSources(sources);
    } catch (err) {
      console.error(err);
      document.getElementById('fileInfo').textContent = 'Error: ' + err.message;
    }
  },

  // Read a buffer into a fully-formed source object: { dg, filename,
  // ntrials, unitLookup, spikeMissing, dataDepthMin, dataDepthMax }.
  // Returns null (and logs) if the file lacks spike data.
  async _buildSourceFromBuffer(buf, name) {
    const dg = await readDGAuto(buf, name);
    if (!hasSpikeData(dg)) {
      console.warn(`${name}: no spike data, skipping`);
      return null;
    }
    const ntrials = countRows(dg);
    let spikeMissing = getScalar(dg, 'spike_missing_value', 0);
    if (spikeMissing == null || isNaN(spikeMissing)) spikeMissing = -1.0;

    const ids    = getSublistData(dg, 'unit_list_id',    0) || [];
    const depths = getSublistData(dg, 'unit_list_depth', 0) || [];
    const xs     = getSublistData(dg, 'unit_list_x',     0);
    const amps   = getSublistData(dg, 'unit_list_amp',   0);
    const snrs   = getSublistData(dg, 'unit_list_snr',   0);
    const frs    = getSublistData(dg, 'unit_list_fr',    0);
    const pres   = getSublistData(dg, 'unit_list_presence', 0);

    const unitLookup = new Map();
    let dMin = Infinity, dMax = -Infinity;
    for (let i = 0; i < ids.length; i++) {
      const d = depths[i];
      unitLookup.set(ids[i], {
        idx: i, depth: d,
        x:   xs   ? xs[i]   : spikeMissing,
        amp: amps ? amps[i] : spikeMissing,
        snr: snrs ? snrs[i] : spikeMissing,
        fr:  frs  ? frs[i]  : spikeMissing,
        pres: pres ? pres[i] : spikeMissing,
      });
      if (d > spikeMissing) {
        if (d < dMin) dMin = d;
        if (d > dMax) dMax = d;
      }
    }
    if (!isFinite(dMin)) { dMin = 0; dMax = 1; }

    return {
      dg, filename: name, ntrials, unitLookup, spikeMissing,
      dataDepthMin: dMin, dataDepthMax: dMax,
    };
  },

  // Adopt a fresh list of sources, replacing whatever was loaded before.
  // Sets up the primary-source mirror fields, computes union depth range,
  // refreshes toolbar + view.
  async _adoptSources(sources) {
    this.sources = sources;
    const primary = sources[0];
    this.dg = primary.dg;
    this.filename = primary.filename;
    this.ntrials = primary.ntrials;
    this.unitLookup = primary.unitLookup;
    this.spikeMissing = primary.spikeMissing;

    // Union depth range across all sources (multi-bank gets the full probe span).
    this.dataDepthMin = Math.min(...sources.map(s => s.dataDepthMin));
    this.dataDepthMax = Math.max(...sources.map(s => s.dataDepthMax));
    this.depthLo = Math.floor(this.dataDepthMin / 100) * 100;
    this.depthHi = Math.ceil(this.dataDepthMax / 100) * 100;

    this.populateDropdowns();
    this._updateFileInfo();

    document.getElementById('dropZone').style.display = 'none';
    document.getElementById('toolbar').style.display = 'flex';
    document.getElementById('toolbarFilters').style.display = 'flex';
    document.getElementById('toolbarAnalysis').style.display = 'flex';
    this._renderFilterChips();

    if (this.mode === 'summary') this._ensureFilterPicked();
    this._updateToolbarLabels();

    this._invalidateAnalysisPanel();
    this.exitDrilldown();
    this.refresh();
  },

  _updateFileInfo() {
    const sources = this.sources;
    const totalTrials = sources.reduce((s, x) => s + x.ntrials, 0);
    const totalUnits  = sources.reduce((s, x) => s + x.unitLookup.size, 0);
    const names = sources.map(s => s.filename).join(' + ');
    const span = `${this.dataDepthMin.toFixed(0)}–${this.dataDepthMax.toFixed(0)} µm`;
    const tag = sources.length > 1 ? ` [${sources.length} sources combined]` : '';
    document.getElementById('fileInfo').textContent =
      `${names} — ${totalTrials} trials, ${totalUnits} units, depth ${span}${tag}`;
  },

  // Pick a sensible filter column for summary mode if none is set.
  _ensureFilterPicked() {
    if (this.filterBy) return;
    const cands = this.discoverRastsBy().filter(c => c !== this.rastsBy);
    if (cands.length > 0) {
      this.filterBy = cands[0];
      document.getElementById('filterBy').value = this.filterBy;
      this.populateFilterValueDropdown();
    }
  },

  // ─── Subset filters ─────────────────────────────────────────────────
  // Semantics: chips ANDed across distinct columns; ORed within the same
  // column. So {ori=90, ori=120, size=4} means
  //   (ori == 90 OR ori == 120) AND size == 4.
  // This is the natural reading of "I added another filter for the same
  // dimension" without forcing the user to learn operator precedence.
  // A column referenced by a chip but missing from a source fails all
  // that source's trials — filter intent is "only these".
  _filtersByCol() {
    const m = new Map();
    for (const f of this.filters) {
      if (!m.has(f.col)) m.set(f.col, []);
      m.get(f.col).push(f.value);
    }
    return m;
  },

  _trialPasses(src, trialIdx) {
    if (this.filters.length === 0) return true;
    for (const [col, vals] of this._filtersByCol()) {
      const list = src.dg.getList(col);
      if (!list || !list.data) return false;
      if (!vals.includes(String(list.data[trialIdx]))) return false;
    }
    return true;
  },

  // Sum kept-vs-total trial counts across all sources under current filters.
  _filterTrialCounts() {
    let kept = 0, total = 0;
    for (const src of this.sources) {
      const ntr = src.ntrials;
      total += ntr;
      if (this.filters.length === 0) { kept += ntr; continue; }
      for (let i = 0; i < ntr; i++) if (this._trialPasses(src, i)) kept++;
    }
    return { kept, total };
  },

  // Short, human-readable list of active subset constraints — for the
  // ANOVA result header so the user always sees what's been narrowed.
  // Includes both chip filters AND the legacy filterBy/filterValue when
  // it's acting as a subset (matrix/overlay views).
  // OR-within-column → "ori ∈ {45, 90}", AND-across-columns → comma-joined.
  _activeFiltersDescription() {
    const parts = [];
    // Legacy filterBy=value subset only applies in matrix/overlay (where
    // it actually narrows the trial set). Summary uses filterBy as the
    // row factor; spatial doesn't use it at all.
    if (this.mode !== 'summary' && this.mode !== 'spatial'
        && this.filterBy && this.filterValue !== '') {
      parts.push(`${this.filterBy}=${this.filterValue}`);
    }
    for (const [col, vals] of this._filtersByCol()) {
      parts.push(vals.length === 1
        ? `${col}=${vals[0]}`
        : `${col}∈{${vals.join(',')}}`);
    }
    return parts.join(', ');
  },

  // Distinct values for `col` across the union of all sources, naturally
  // sorted (numeric if both parse as numbers; lexicographic otherwise).
  _distinctValuesForCol(col) {
    const seen = new Set();
    const vals = [];
    for (const src of this.sources) {
      const list = src.dg.getList(col);
      if (!list || !list.data) continue;
      const ntr = src.ntrials;
      for (let i = 0; i < ntr; i++) {
        const v = list.data[i];
        const k = String(v);
        if (seen.has(k)) continue;
        seen.add(k); vals.push(v);
      }
    }
    vals.sort((a, b) => {
      const an = Number(a), bn = Number(b);
      if (Number.isFinite(an) && Number.isFinite(bn)) return an - bn;
      return String(a).localeCompare(String(b));
    });
    return vals;
  },

  // Render the chips DOM from this.filters. The value is an inline
  // <select> so the user can flip values without removing + re-adding the
  // chip — quick a/b/c comparison is the whole point of the explorer.
  // Column stays as a static label; switching column = different chip.
  _renderFilterChips() {
    const host = document.getElementById('filterChips');
    if (!host) return;
    host.innerHTML = '';
    for (let i = 0; i < this.filters.length; i++) {
      const f = this.filters[i];
      // OR-within-column: render a small "or" separator between this
      // chip and the previous one when they share a column.
      if (i > 0 && this.filters[i - 1].col === f.col) {
        const orSep = document.createElement('span');
        orSep.className = 'chip-or'; orSep.textContent = 'or';
        host.appendChild(orSep);
      }
      const chip = document.createElement('span');
      chip.className = 'chip';

      const key = document.createElement('span');
      key.className = 'chip-key';
      // Hide the "col=" prefix when this chip continues an OR-group, so
      // we read "ori = 45 or 90" rather than "ori=45 or ori=90".
      const continuesOr = i > 0 && this.filters[i - 1].col === f.col;
      key.textContent = continuesOr ? '' : `${f.col}=`;
      key.style.display = continuesOr ? 'none' : '';

      const valSel = document.createElement('select');
      valSel.className = 'chip-val';
      const vals = this._distinctValuesForCol(f.col);
      // If the current value isn't among the source values (e.g. all
      // sources lack the column), keep it visible so we don't silently
      // forget what the chip was set to.
      const havePresent = vals.some(v => String(v) === f.value);
      if (!havePresent) {
        const opt = document.createElement('option');
        opt.value = f.value; opt.textContent = `${f.value} (missing)`;
        valSel.appendChild(opt);
      }
      for (const v of vals) {
        const opt = document.createElement('option');
        opt.value = String(v); opt.textContent = this.formatValue(v);
        valSel.appendChild(opt);
      }
      valSel.value = f.value;
      // Auto-resize the select to fit its current option label.
      valSel.style.width =
        Math.max(2, valSel.options[valSel.selectedIndex]?.text.length ?? 2)
        + 1.5 + 'ch';
      valSel.addEventListener('change',
        () => this._changeFilterValue(i, valSel.value));

      const x = document.createElement('button');
      x.className = 'chip-x'; x.title = 'Remove'; x.textContent = '×';
      x.addEventListener('click', () => this._removeFilter(i));

      chip.appendChild(key);
      chip.appendChild(valSel);
      chip.appendChild(x);
      host.appendChild(chip);
    }
    const status = document.getElementById('filterStatus');
    if (status) {
      if (this.sources.length === 0) {
        status.textContent = '';
      } else {
        const { kept, total } = this._filterTrialCounts();
        const pct = total ? Math.round(kept / total * 100) : 0;
        status.textContent = this.filters.length
          ? `keeping ${kept}/${total} trials (${pct}%)`
          : `${total} trials, no filter`;
      }
    }
  },

  _changeFilterValue(idx, newValue) {
    if (idx < 0 || idx >= this.filters.length) return;
    if (newValue === '' || newValue == null) return;
    const f = this.filters[idx];
    const v = String(newValue);
    // If the new value collides with another chip on the same column,
    // drop *this* chip instead of creating a duplicate — semantically
    // identical, less visual noise.
    const dup = this.filters.findIndex(
      (g, j) => j !== idx && g.col === f.col && g.value === v);
    if (dup !== -1) {
      this.filters.splice(idx, 1);
    } else {
      this.filters[idx] = { ...f, value: v };
    }
    this._renderFilterChips();
    this._invalidateAnalysisPanel();
    this.refresh();
  },

  // Insert a draft chip with column + value selects. The column dropdown
  // excludes any column already in this.filters (no point in stacking
  // contradictory chips on the same column). The value dropdown lists the
  // distinct values that appear in the union of all sources for that
  // column. "Add" commits; "×" cancels without adding.
  _addFilterDraft() {
    const host = document.getElementById('filterChips');
    if (!host) return;
    if (host.querySelector('.chip-draft')) return;   // one draft at a time

    // Candidate columns: same heuristic as group-by. Already-chipped
    // columns are *allowed* — adding a second chip on the same column
    // is how you express "ori == 90 OR ori == 120" (OR within column,
    // AND across columns).
    const cands = this.discoverRastsBy();
    if (cands.length === 0) return;

    const draft = document.createElement('span');
    draft.className = 'chip-draft';
    const colSel = document.createElement('select');
    for (const c of cands) {
      const o = document.createElement('option');
      o.value = c; o.textContent = c;
      colSel.appendChild(o);
    }
    const eq = document.createElement('span');
    eq.className = 'draft-eq'; eq.textContent = '=';
    const valSel = document.createElement('select');
    const go = document.createElement('button');
    go.className = 'draft-go primary'; go.textContent = 'add';
    const cancel = document.createElement('button');
    cancel.className = 'draft-cancel'; cancel.title = 'cancel';
    cancel.textContent = '×';

    const fillValues = () => {
      valSel.innerHTML = '';
      for (const v of this._distinctValuesForCol(colSel.value)) {
        const o = document.createElement('option');
        o.value = String(v); o.textContent = this.formatValue(v);
        valSel.appendChild(o);
      }
    };
    fillValues();
    colSel.addEventListener('change', fillValues);
    go.addEventListener('click', () =>
      this._commitFilter(colSel.value, valSel.value));
    cancel.addEventListener('click', () => draft.remove());

    draft.appendChild(colSel);
    draft.appendChild(eq);
    draft.appendChild(valSel);
    draft.appendChild(go);
    draft.appendChild(cancel);
    host.appendChild(draft);
    valSel.focus();
  },

  _commitFilter(col, value) {
    if (!col || value === '' || value == null) return;
    const v = String(value);
    // Drop exact dup — same {col, value} pair already exists.
    if (this.filters.some(f => f.col === col && f.value === v)) {
      // Still rerender to clear any draft chip that's open.
      this._renderFilterChips();
      return;
    }
    this.filters.push({ col, value: v });
    this._renderFilterChips();
    this._invalidateAnalysisPanel();
    this.refresh();
  },

  _removeFilter(idx) {
    if (idx < 0 || idx >= this.filters.length) return;
    this.filters.splice(idx, 1);
    this._renderFilterChips();
    this._invalidateAnalysisPanel();
    this.refresh();
  },

  // Toolbar label & visibility differ between modes. In summary mode the
  // filter column IS the row dimension, and the value-select is irrelevant
  // (we render every value as a row). In matrix/overlay modes the value
  // is meaningful — it selects which subset to drill into.
  _updateToolbarLabels() {
    const isSummary = this.mode === 'summary';
    const isMatrix  = this.mode === 'matrix';
    const isSpatial = this.mode === 'spatial';
    const lab = document.getElementById('filterLabelText');
    const eq  = document.getElementById('filterEquals');
    const val = document.getElementById('filterValue');
    const filterLabel = document.getElementById('filterLabel');
    const rastsByLabel = document.getElementById('rastsBy').parentElement;
    if (lab) lab.textContent = isSummary ? 'rows' : 'filter';
    if (eq)  eq.style.display  = isSummary ? 'none' : '';
    if (val) val.style.display = isSummary ? 'none' : '';
    // Spatial mode hides rasts-by/filter and shows X/Y instead.
    if (filterLabel)  filterLabel.style.display  = isSpatial ? 'none' : '';
    if (rastsByLabel) rastsByLabel.style.display = isSpatial ? 'none' : '';
    document.getElementById('spatialXLabel').style.display = isSpatial ? '' : 'none';
    document.getElementById('spatialYLabel').style.display = isSpatial ? '' : 'none';
    // flip-Y: relevant for 2D summary (rows axis is up/down). Spatial mode
    // always uses up-positive convention internally so no toggle needed.
    document.getElementById('flipYLabel').style.display = isSummary ? '' : 'none';
    document.getElementById('flipY').checked = !!this.flipY;
    // Analysis buttons: meaningful in summary (2-way: cols × rows),
    // matrix (1-way: cols), and spatial (1-way: location). Hidden in
    // overlay (no aggregate response axis there).
    const showAnalysis = (isSummary || isMatrix || isSpatial) ? '' : 'none';
    const a = document.getElementById('btnAnalyzeANOVA');
    const t = document.getElementById('btnAnalyzeOverTime');
    if (a) a.style.display = showAnalysis;
    if (t) t.style.display = showAnalysis;
    // Hide the analysis-toolbar 'analysis' label too when there's nothing
    // statistical to do — the row collapses to just Copy-as-Python.
    const lbl = document.querySelector('#toolbarAnalysis .toolbar-label');
    if (lbl) lbl.style.display = showAnalysis;
  },

  // Auto-pick flip-Y when the row column looks like a y/elevation axis.
  // Only overrides previously-auto-set values; if the user explicitly
  // toggled the checkbox we leave their choice alone.
  _maybeAutoFlipY() {
    if (!this.flipYAutoApplied && this.flipY) return;  // user set true manually
    const looksLikeY = !!this.filterBy && /(^|_)y($|_|deg|pos)/i.test(this.filterBy);
    this.flipY = looksLikeY;
    this.flipYAutoApplied = true;
    const cb = document.getElementById('flipY');
    if (cb) cb.checked = looksLikeY;
  },

  // Top-level dispatch: pick the right view for the current mode.
  refresh() {
    if (!this.dg) return;
    this.buildPanels();
    const grid    = document.getElementById('grid');
    const matWrap = document.getElementById('matrixWrap');
    if (this.mode === 'matrix') {
      grid.style.display = 'none';
      matWrap.classList.add('active');
      this.renderMatrix();
    } else if (this.mode === 'summary') {
      grid.style.display = 'none';
      matWrap.classList.add('active');
      this.renderSummary();
    } else if (this.mode === 'spatial') {
      grid.style.display = 'none';
      matWrap.classList.add('active');
      this.renderSpatialMap();
    } else {
      grid.style.display = 'grid';
      matWrap.classList.remove('active');
      this.renderPanels();
    }
  },

  // (per-source metadata is built in _buildSourceFromBuffer; this used to
  //  be a per-instance helper called prepSpikeMeta.)

  // ─── Discovery heuristics ───
  // Group-by candidates: scalar columns with a small enumerable value set.
  // We exclude per-trial-unique columns (filename, trialid, obsid), our
  // own spike_*/unit_list_* columns, and event-timing columns.
  discoverRastsBy() {
    const STIMHINTS = ['stim','sample','choice','response','resp','reward','feedback','onset','offset','acquired','land_time'];
    const SKIP = new Set(['filename','date','time','hostname','trialid','obsid','system','protocol','variant','subject','spike_src_trial']);
    const out = [];
    for (const list of this.dg.lists) {
      const nm = list.name;
      if (list.dataType === DF_LIST) continue;
      if (nm.startsWith('spike_') || nm.startsWith('unit_list_')) continue;
      if (SKIP.has(nm)) continue;
      if (STIMHINTS.some(h => nm.toLowerCase().includes(h))) continue;
      // Bound the unique-set scan to keep this O(ntrials) and not pull in
      // millions of strings from per-trial-unique columns. The `< 0.5 *
      // ntrials` guard is what excludes those (trialid, obsid, etc.); we
      // keep a generous absolute ceiling (64) so paradigms like planko
      // bits (~20 stimulus snippets) qualify, but a column with truly
      // many uniques is filtered out as too noisy to group by.
      const u = new Set();
      const N = Math.min(this.ntrials, list.data.length || 0);
      for (let i = 0; i < N && u.size < 96; i++) u.add(list.data[i]);
      const n = u.size;
      if (n >= 2 && n <= 64 && n < 0.5 * this.ntrials) out.push(nm);
    }
    // Demote paradigm-setup-style columns so the auto-default picks a
    // stimulus parameter rather than something like obs_duration. They
    // remain in the dropdown — only the auto-pick order changes.
    const DEMOTE = new Set([
      'obs_duration', 'fixate', 'refixate', 'reward_ul',
      'refresh_rate', 'pointsize', 'lifetime', 'speed_deg_sec',
      'repeat_count',
    ]);
    return out.sort((a, b) => {
      const da = DEMOTE.has(a) ? 1 : 0;
      const db = DEMOTE.has(b) ? 1 : 0;
      return da - db;   // 0s first, 1s last; stable for ties
    });
  },
  // Spatial-pair candidates: numeric scalar columns that pair up by name
  // as (X, Y). Matches any `<prefix>_x` / `<prefix>_y` pair (covers
  // stim_x/stim_y, targ_x/targ_y, patch_x/patch_y, dot_x/dot_y, …) plus
  // a few hand-recognized spellings (h/v, az/el). Both columns must be
  // numeric scalars with ≥3 unique values and a non-zero range.
  discoverSpatialPairs() {
    const candidates = new Map();   // colName -> {prefix, axis: 'x'|'y'}
    for (const list of this.dg.lists) {
      if (list.dataType === DF_LIST || list.dataType === DF_STRING) continue;
      const nm = list.name;
      if (nm.startsWith('spike_') || nm.startsWith('unit_list_')) continue;
      // Pattern A: <prefix>_x or <prefix>_y (case-insensitive, must have prefix)
      let m = nm.match(/^(.+)_([xy])$/i);
      if (m) { candidates.set(nm, { prefix: m[1].toLowerCase(), axis: m[2].toLowerCase() }); continue; }
      // Pattern B: <prefix>_h / <prefix>_v (horizontal/vertical)
      m = nm.match(/^(.+)_([hv])$/i);
      if (m) { candidates.set(nm, { prefix: m[1].toLowerCase(), axis: m[2].toLowerCase() === 'h' ? 'x' : 'y' }); continue; }
      // Pattern C: <prefix>_az / <prefix>_el (azimuth/elevation)
      m = nm.match(/^(.+)_(az|el)$/i);
      if (m) { candidates.set(nm, { prefix: m[1].toLowerCase(), axis: m[2].toLowerCase() === 'az' ? 'x' : 'y' }); continue; }
    }
    // Group by prefix; emit pair only if BOTH axes present and both are
    // varying (≥3 unique numeric values with a real range).
    const byPrefix = new Map();
    for (const [name, info] of candidates) {
      if (!byPrefix.has(info.prefix)) byPrefix.set(info.prefix, {});
      byPrefix.get(info.prefix)[info.axis] = name;
    }
    const validateCol = (name) => {
      const list = this.dg.getList(name);
      if (!list || !list.data) return false;
      const u = new Set();
      let mn = Infinity, mx = -Infinity;
      const N = Math.min(this.ntrials, list.data.length || 0);
      for (let i = 0; i < N; i++) {
        const v = Number(list.data[i]);
        if (!Number.isFinite(v)) continue;
        u.add(v);
        if (v < mn) mn = v; if (v > mx) mx = v;
        if (u.size > 64) return false;   // too dense, not a coord axis
      }
      return u.size >= 3 && mx > mn;
    };
    const pairs = [];
    for (const [prefix, axes] of byPrefix) {
      if (!axes.x || !axes.y) continue;
      if (!validateCol(axes.x) || !validateCol(axes.y)) continue;
      pairs.push({ prefix, x: axes.x, y: axes.y });
    }
    // Prefer common stimulus-position spellings first.
    const PRIORITY = ['stim','target','targ','patch','sample','dot','probe','rf'];
    pairs.sort((a, b) => {
      const pa = PRIORITY.indexOf(a.prefix); const pb = PRIORITY.indexOf(b.prefix);
      const ra = pa < 0 ? PRIORITY.length : pa;
      const rb = pb < 0 ? PRIORITY.length : pb;
      return ra - rb || a.prefix.localeCompare(b.prefix);
    });
    return pairs;
  },

  // Alignment candidates: numeric scalar columns whose names suggest a
  // timing event.
  discoverAlignTo() {
    const STIMHINTS = ['stim','sample','choice','response','resp','reward','feedback','onset','offset','acquired','land_time','cue','target'];
    const out = [];
    for (const list of this.dg.lists) {
      if (list.dataType === DF_LIST || list.dataType === DF_STRING) continue;
      const nm = list.name;
      if (nm.startsWith('spike_') || nm.startsWith('unit_list_')) continue;
      if (!STIMHINTS.some(h => nm.toLowerCase().includes(h))) continue;
      out.push(nm);
    }
    return out;
  },

  // ─── Toolbar setup ───
  populateDropdowns() {
    const groupOpts = this.discoverRastsBy();
    const alignOpts = this.discoverAlignTo();

    const fillSelect = (id, opts, current) => {
      const sel = document.getElementById(id);
      sel.innerHTML = '';
      for (const o of opts) {
        const opt = document.createElement('option');
        opt.value = o; opt.textContent = o;
        sel.appendChild(opt);
      }
      if (opts.length === 0) {
        const opt = document.createElement('option');
        opt.value = ''; opt.textContent = '(none found)';
        sel.appendChild(opt); sel.disabled = true;
      } else {
        sel.disabled = false;
        sel.value = (current && opts.includes(current)) ? current : opts[0];
      }
    };
    fillSelect('rastsBy', groupOpts, this.rastsBy);
    // Prefer stim_on/stimon as the default alignment for our visual-cell work.
    const alignDefault = ['stim_on', 'stimon', 'stimulus_on']
      .find(c => alignOpts.includes(c)) || alignOpts[0];
    fillSelect('alignTo', alignOpts, this.alignTo || alignDefault);
    this.rastsBy = document.getElementById('rastsBy').value;
    this.alignTo = document.getElementById('alignTo').value;

    // Spatial X/Y picks: union across discovered pairs. The X dropdown
    // lists every X candidate, the Y dropdown every Y candidate, so the
    // user can mix-and-match if they have, say, stim_x with targ_y. Auto
    // -default to the highest-priority complete pair.
    const pairs = this.discoverSpatialPairs();
    const xOpts = [...new Set(pairs.map(p => p.x))];
    const yOpts = [...new Set(pairs.map(p => p.y))];
    const defaultPair = pairs[0] || null;
    fillSelect('spatialX', xOpts, this.spatialX || (defaultPair ? defaultPair.x : ''));
    fillSelect('spatialY', yOpts, this.spatialY || (defaultPair ? defaultPair.y : ''));
    this.spatialX = document.getElementById('spatialX').value;
    this.spatialY = document.getElementById('spatialY').value;
    // Disable the spatial-map view-mode option if we couldn't find a pair.
    const spatialOpt = document.querySelector('#viewMode option[value="spatial"]');
    if (spatialOpt) spatialOpt.disabled = pairs.length === 0;

    // Filter dropdowns (depend on the rastsBy choice — populated after).
    this.populateFilterDropdowns();

    // Window & depth inputs
    document.getElementById('winPre').value  = this.winPre;
    document.getElementById('winPost').value = this.winPost;
    this.syncDepthInputs();
  },

  // Filter columns: same heuristic as rasts-by, but exclude whichever
  // column is currently the rasts-by axis. Adds a "(none)" sentinel so
  // the user can disable the secondary filter.
  populateFilterDropdowns() {
    const all = this.discoverRastsBy().filter(c => c !== this.rastsBy);
    const sel = document.getElementById('filterBy');
    sel.innerHTML = '';
    const noneOpt = document.createElement('option');
    noneOpt.value = ''; noneOpt.textContent = '(none)';
    sel.appendChild(noneOpt);
    for (const c of all) {
      const opt = document.createElement('option');
      opt.value = c; opt.textContent = c;
      sel.appendChild(opt);
    }
    // Preserve user choice if still valid; else reset to (none)
    if (this.filterBy && all.includes(this.filterBy)) {
      sel.value = this.filterBy;
    } else {
      sel.value = '';
      this.filterBy = '';
      this.filterValue = '';
    }
    this._maybeAutoFlipY();
    this.populateFilterValueDropdown();
  },

  populateFilterValueDropdown() {
    const sel = document.getElementById('filterValue');
    sel.innerHTML = '';
    if (!this.filterBy) {
      const opt = document.createElement('option');
      opt.value = ''; opt.textContent = '—';
      sel.appendChild(opt);
      sel.disabled = true;
      this.filterValue = '';
      return;
    }
    sel.disabled = false;
    const list = this.dg.getList(this.filterBy);
    if (!list || !list.data) return;
    const seen = new Set();
    const values = [];
    for (let i = 0; i < this.ntrials; i++) {
      const v = list.data[i];
      const k = String(v);
      if (!seen.has(k)) { seen.add(k); values.push(v); }
    }
    values.sort((a, b) => {
      const av = Number(a), bv = Number(b);
      if (Number.isFinite(av) && Number.isFinite(bv)) return av - bv;
      return String(a).localeCompare(String(b));
    });
    for (const v of values) {
      const opt = document.createElement('option');
      opt.value = String(v);
      opt.textContent = this.formatValue(v);
      sel.appendChild(opt);
    }
    // Preserve previous choice if it still exists; otherwise pick first.
    if (this.filterValue && values.some(v => String(v) === this.filterValue)) {
      sel.value = this.filterValue;
    } else {
      sel.value = String(values[0]);
      this.filterValue = sel.value;
    }
  },
  syncDepthInputs() {
    document.getElementById('depthLo').value = this.depthLo;
    document.getElementById('depthHi').value = this.depthHi;
  },
  onControlsChanged() {
    this._invalidateAnalysisPanel();
    this.rastsBy = document.getElementById('rastsBy').value || this.rastsBy;
    this.alignTo = document.getElementById('alignTo').value || this.alignTo;
    let pre = Number(document.getElementById('winPre').value);
    let post = Number(document.getElementById('winPost').value);
    if (Number.isFinite(pre)) this.winPre = pre;
    if (Number.isFinite(post)) this.winPost = post;
    if (this.winPre > this.winPost) { const t = this.winPre; this.winPre = this.winPost; this.winPost = t; }
    let lo = Number(document.getElementById('depthLo').value);
    let hi = Number(document.getElementById('depthHi').value);
    if (Number.isFinite(lo)) this.depthLo = lo;
    if (Number.isFinite(hi)) this.depthHi = hi;
    if (this.depthLo > this.depthHi) { const t = this.depthLo; this.depthLo = this.depthHi; this.depthHi = t; }
    document.getElementById('winPre').value = this.winPre;
    document.getElementById('winPost').value = this.winPost;
    this.syncDepthInputs();
    // If we were drilled in (overlay mode only), redraw the drill view too
    if (this.drillKey != null) this.renderDrilldown(); else this.refresh();
  },

  // ─── Build panels: group trials by value of rastsBy column ───
  // Optionally pre-filter by a secondary condition (filterBy = filterValue),
  // e.g. "ori panels, but only patch_size=4 trials".
  buildPanels() {
    const list = this.dg.getList(this.rastsBy);
    if (!list || !list.data) { this.panels = []; return; }

    // Resolve secondary filter (column data + canonical string value).
    const fList = this.filterBy ? this.dg.getList(this.filterBy) : null;
    const fVal = (fList && this.filterValue !== '') ? this.filterValue : null;
    const primary = this.sources[0];

    const groups = new Map();
    for (let i = 0; i < this.ntrials; i++) {
      if (fList && fVal !== null && String(fList.data[i]) !== fVal) continue;
      if (primary && !this._trialPasses(primary, i)) continue;
      const v = list.data[i];
      if (!groups.has(v)) groups.set(v, []);
      groups.get(v).push(i);
    }
    const entries = [...groups.entries()].sort((a, b) => {
      const av = Number(a[0]), bv = Number(b[0]);
      if (Number.isFinite(av) && Number.isFinite(bv)) return av - bv;
      return String(a[0]).localeCompare(String(b[0]));
    });
    this.panels = entries.map(([value, trials]) => ({ value, trials }));
  },

  // ─── Render the panel grid (overlay mode) ───
  renderPanels() {
    if (!this.dg) return;
    this.buildPanels();
    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    if (this.panels.length === 0) {
      grid.innerHTML = '<div class="empty">No groups for this column.</div>';
      document.getElementById('status').textContent = '';
      return;
    }

    const filterDesc = this.filterBy
      ? ` · filtered to ${this.filterBy}=${this.filterValue}`
      : '';
    const nUnits = this.unitsInDepthRange();
    const multiNote = this.sources.length > 1
      ? ` · showing source 1/${this.sources.length} (${this.sources[0].filename}); switch to 2D summary to combine`
      : '';
    document.getElementById('status').textContent =
      `${this.panels.length} panels · grouped by ${this.rastsBy}${filterDesc} · aligned to ${this.alignTo} · ${nUnits}/${this.unitsTotal()} units in depth${multiNote}`;

    // Use a fixed canvas height per panel so all panels share scale visually.
    const CANVAS_W = 220, CANVAS_H = 200;
    for (const panel of this.panels) {
      const card = document.createElement('div');
      card.className = 'panel';
      card.innerHTML = `
        <div class="panel-head">
          <span>${this.rastsBy} =</span>
          <span class="v">${this.formatValue(panel.value)}</span>
          <span class="n">n=${panel.trials.length}</span>
        </div>
        <canvas class="panel-canvas" width="${CANVAS_W * this.dpr}" height="${CANVAS_H * this.dpr}" style="height:${CANVAS_H}px;"></canvas>
      `;
      card.addEventListener('click', () => this.enterDrilldown(panel));
      grid.appendChild(card);
      const canvas = card.querySelector('canvas');
      const ctx = canvas.getContext('2d');
      ctx.setTransform(this.dpr, 0, 0, this.dpr, 0, 0);
      this.renderOverlay(ctx, panel, CANVAS_W, CANVAS_H);
    }
  },

  formatValue(v) {
    if (typeof v === 'number') {
      if (Number.isInteger(v)) return String(v);
      return Number(v).toPrecision(4);
    }
    return String(v);
  },

  // Build and clipboard-copy a Python snippet that reproduces the current
  // view in esslab. Saves the user from re-typing rasts_by/filter_by/
  // align/window/depth_range parameters when going from "I see something"
  // to "let me run a stat test on it".
  //
  // Multi-source note: the snippet always loops over ses.files. For a
  // single source this is one iteration; for combined banks it gives
  // you per-bank replication of the same test (the right way to test
  // multi-bank consistency, since unit_id namespaces don't align across
  // recordings — see README).
  _copyPythonSnippet() {
    // The browser doesn't expose absolute paths from drag-drop, so we
    // emit obvious placeholders the user has to edit. Filenames are
    // exact since spike_explorer remembers them.
    const paths = this.sources.map(s =>
      `    "/PATH/TO/spikes/${s.filename}",`).join('\n');
    const isMulti = this.sources.length > 1;
    const sourcesNote = isMulti
      ? `# ${this.sources.length} sources loaded — likely complementary banks of the
# same protocol. The 2D summary view in spike_explorer combines them
# visually (depth-binned heatmap). Below, we test each bank
# independently and look for replication — that's the right cross-bank
# check, since unit_id namespaces don't align across recordings.`
      : `# Single source.`;
    const twoWayNote = this.filterBy && this.filterBy !== this.rastsBy;
    const dim2Repr = twoWayNote ? `"${this.filterBy}"` : 'None';
    const filtersRepr = this.filters.length
      ? '[' + this.filters.map(f => `("${f.col}", "${f.value}")`).join(', ') + ']'
      : '[]';
    const filtersComment = this.filters.length
      ? this.filters.map(f => `${f.col}=${f.value}`).join(', ')
      : '(none)';
    const snippet = `# Reproduces the current spike_explorer view in Python.
# NOTE: file paths are placeholders — the browser can't expose absolute
# paths from drag-drop. Edit them before running.
#
# This snippet matches the in-browser ANOVA the explorer just showed you,
# and is the off-ramp for anything heavier (per-unit enrichment with
# multiple-comparison correction, population decoders, continuous /
# circular factors, etc.) — keep variables in their native types so you
# can model them properly here.
import numpy as np
from esslab import SpikeSession
from esslab.analysis import (
    windowed_counts, time_resolved_counts,
    condition_labels,
    anova_aggregate, anova_over_time,
)

ses = SpikeSession([
${paths}
])
${sourcesNote}

# Toolbar state at copy time:
#   cols (rasts by): ${this.rastsBy}
#   rows (filter)  : ${this.filterBy || '(none — 1-way ANOVA on cols)'}
#   align          : ${this.alignTo}
#   window         : (${this.winPre}, ${this.winPost}) ms
#   depth          : (${this.depthLo}, ${this.depthHi}) µm
#   subset filters : ${filtersComment}

dim1_col = "${this.rastsBy}"
dim2_col = ${dim2Repr}     # None → 1-way ANOVA on dim1
# Filter chips — applied to every per-trial loop below as an AND of equals.
# Edit / remove tuples to change subsetting. Empty list = use all trials.
filters  = ${filtersRepr}

def _filter_mask(trials, filters):
    """AND across distinct columns, OR within the same column.
    {('ori','90'), ('ori','120'), ('size','4')} →
        (ori == 90 OR ori == 120) AND (size == 4)."""
    if not filters: return np.ones(len(trials), dtype=bool)
    by_col = {}
    for col, val in filters:
        by_col.setdefault(col, []).append(str(val))
    m = np.ones(len(trials), dtype=bool)
    for col, vals in by_col.items():
        if col not in trials:
            return np.zeros(len(trials), dtype=bool)
        col_data = trials[col].astype(str)
        m &= np.isin(col_data, vals)
    return m

# 1) Aggregate ANOVA on per-trial spike count in [${this.winPre}, ${this.winPost}] ms.
for sf in ses.files:
    counts, ids = windowed_counts(
        sf,
        window=(${this.winPre}, ${this.winPost}),
        align_col="${this.alignTo}",
        depth_range=(${this.depthLo}, ${this.depthHi}),
    )
    if len(ids) == 0:
        bank_lo, bank_hi = sf.depth_range
        print(f"{sf.path.name}: 0 units — bank covers "
              f"{bank_lo:.0f}-{bank_hi:.0f} µm, outside selected band")
        continue
    keep = _filter_mask(sf.trials, filters)
    y    = counts[keep].sum(axis=1)   # per-trial summed count across kept units
    dim1 = condition_labels(sf.trials, dim1_col)[keep]
    dim2 = condition_labels(sf.trials, dim2_col)[keep] if dim2_col else None
    r = anova_aggregate(dim1, dim2, y)
    print(f"{sf.path.name}: N={r['n']} (kept {int(keep.sum())}/{len(keep)})")
    for e in r["effects"]:
        print(f"  {e['name']:<14s} F({e['df']},{e['df_resid']})={e['F']:.2f}  "
              f"p={e['p']:.4g}  η²p={e['partial_eta2']:.3f}")

# 2) η² over time — when does each effect lift off baseline?
import matplotlib.pyplot as plt
fig, ax = plt.subplots(figsize=(6, 3))
centers = np.arange(${this.winPre} + 25, ${this.winPost} - 24, 10)  # 50-ms window centers
for sf in ses.files:
    cube, ids, _ = time_resolved_counts(
        sf, centers, width_ms=50,
        align_col="${this.alignTo}",
        depth_range=(${this.depthLo}, ${this.depthHi}),
    )
    if len(ids) == 0: continue
    keep  = _filter_mask(sf.trials, filters)
    rates = cube[keep] / 0.050   # spikes/sec; cube shape (N_trials, N_units, N_times)
    dim1  = condition_labels(sf.trials, dim1_col)[keep]
    dim2  = condition_labels(sf.trials, dim2_col)[keep] if dim2_col else None
    r = anova_over_time(rates, dim1, dim2)   # returns η² traces per effect
    for eff in r["effects"]:
        ax.plot(centers, eff["q50"], label=f'{sf.path.name}: {eff["name"]}')
ax.set(xlabel=f"time vs ${this.alignTo} (ms)",
       ylabel="median η² across units",
       title=f"selectivity for {dim1_col}" + (f" × {dim2_col}" if dim2_col else ""))
ax.legend(fontsize=8)
plt.tight_layout()

# 3) Need more? The explorer is intentionally just a quick pass.
#    For per-unit enrichment with BH correction, population decoders,
#    or continuous / circular factor handling (orientation, x/y, etc.),
#    fit those here on the raw arrays — they survive whatever modeling
#    choices you want to make.
`;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(snippet).then(() => {
        this._flashStatus('Python snippet copied to clipboard');
      }).catch(err => {
        console.warn('clipboard failed:', err);
        this._showSnippetFallback(snippet);
      });
    } else {
      this._showSnippetFallback(snippet);
    }
  },

  _flashStatus(msg) {
    const el = document.getElementById('status');
    if (!el) return;
    const prev = el.textContent;
    el.textContent = msg;
    setTimeout(() => { if (el.textContent === msg) el.textContent = prev; }, 1800);
  },

  // ─── Pyodide analyses ────────────────────────────────────────────────
  // Extract the per-trial inputs the analyses need, honoring the same
  // align/window/depth/columns the 2D summary is currently rendering.
  //
  // Granularity: if every loaded source carries a per-spike `spike_unit`
  // column, columns of X are sorted units (depth-filtered by their
  // `unit_list_depth`). Otherwise we fall back to ~100 µm depth bins.
  //
  // Returns:
  //   { dim1, dim2, y, X, shape, nUnits, granularity, unitsMeta,
  //     skipped, total, dim1Name, dim2Name, windowMs, depthRange }
  // y is per-trial spike count summed across kept units in window.
  // X is (N_trials × nUnits) firing rates in spikes/sec.
  // Resolve the primary grouping factor for analyses.
  //   spatial mode → (spatialX, spatialY) pair, label "x|y"
  //   else         → rastsBy column
  // Returns { kind, dim1Name, getValueForTrial(src, i) -> string|null }.
  // `getValueForTrial` returns null when the trial should be skipped (no
  // source coverage of the grouping columns), letting callers fold that
  // into their existing skip-counting.
  _resolveAnalysisGrouping() {
    if (this.mode === 'spatial') {
      if (!this.spatialX || !this.spatialY)
        throw new Error('spatial map needs both x and y columns set');
      const dim1Name = `${this.spatialX}×${this.spatialY}`;
      // Per-source column lookups so we don't dg.getList() in the hot loop.
      const cols = new Map();   // src -> {x, y}
      const getCols = (src) => {
        let c = cols.get(src);
        if (!c) {
          c = {
            x: src.dg.getList(this.spatialX),
            y: src.dg.getList(this.spatialY),
          };
          cols.set(src, c);
        }
        return c;
      };
      return {
        kind: 'spatial', dim1Name,
        getValueForTrial(src, i) {
          const c = getCols(src);
          if (!c.x || !c.y) return null;
          const xv = Number(c.x.data[i]), yv = Number(c.y.data[i]);
          if (!Number.isFinite(xv) || !Number.isFinite(yv)) return null;
          // Same precision as the spatial-map bucketing so a position with
          // identical (x, y) trials lands in one group, not many.
          return `${xv.toFixed(4)}|${yv.toFixed(4)}`;
        },
      };
    }
    if (!this.rastsBy) throw new Error('need rasts-by (cols) set');
    const rastsBy = this.rastsBy;
    return {
      kind: 'rastsBy', dim1Name: rastsBy,
      getValueForTrial(src, i) {
        const col = src.dg.getList(rastsBy);
        if (!col) return null;
        return String(col.data[i]);
      },
    };
  },

  _buildAnalysisInputs() {
    if (!this.sources.length) throw new Error('no data loaded');
    const grouping = this._resolveAnalysisGrouping();
    const isSpatial = grouping.kind === 'spatial';
    // The role of `filterBy` depends on the view:
    //   summary  → second factor (rows axis); 2-way ANOVA.
    //   matrix   → subset filter (filterBy = filterValue); 1-way ANOVA
    //              on rastsBy of the subsetted trials.
    //   overlay  → analysis is hidden, but treat like matrix if hit.
    //   spatial  → 1-way on (x, y) location pair; subset filter via filterBy
    //              follows the same legacy-subset rule as matrix.
    // This matches what the visualization above is doing — including
    // filterBy as a second factor in matrix mode would be wrong (every
    // shown trial has the same filterValue, so the factor has 1 level).
    const twoWay = this.mode === 'summary'
      && !!this.filterBy && this.filterBy !== this.rastsBy;
    if (this.mode === 'summary'
        && this.filterBy && this.filterBy === this.rastsBy) {
      throw new Error('rows and cols must be different columns');
    }
    const subsetByLegacyFilter =
      (this.mode !== 'summary' && this.mode !== 'spatial')
      && !!this.filterBy && this.filterValue !== '';
    const tMin = this.winPre, tMax = this.winPost;
    const dLo  = this.depthLo, dHi = this.depthHi;
    if (!(tMax > tMin)) throw new Error('window is empty (winPost <= winPre)');
    if (!(dHi  > dLo))  throw new Error('depth range is empty');
    const tWinSec = Math.max(1e-9, (tMax - tMin) / 1000);

    // Detect granularity: sorted-unit mode requires `spike_unit` in every
    // source we'll touch. If any source lacks it, fall back to depth bins
    // for the whole analysis (mixing granularities is confusing).
    let useUnits = true;
    for (const src of this.sources) {
      if (!src.dg.getList('spike_unit')) { useUnits = false; break; }
    }

    // Per-source kept-unit map (depth-filtered) → global column index.
    // Column key is `${sourceIdx}|${unitId}` so units from different
    // sources get distinct columns.
    const unitsMeta = [];   // [{sourceIdx, unitId, depth, snr, fr}, ...]
    const unitColBySrc = []; // Map<unitId, colIdx> per source
    let nUnits = 0;
    let binDw = 0;

    if (useUnits) {
      for (let s = 0; s < this.sources.length; s++) {
        const lookup = this.sources[s].unitLookup;
        const m = new Map();
        if (lookup) {
          // Sort units by depth so columns are interpretable left-to-right.
          const entries = [...lookup.entries()].sort(
            (a, b) => Number(a[1].depth) - Number(b[1].depth));
          for (const [unitId, info] of entries) {
            const d = Number(info.depth);
            if (!Number.isFinite(d) || d < dLo || d >= dHi) continue;
            m.set(unitId, unitsMeta.length);
            unitsMeta.push({
              sourceIdx: s, unitId, depth: d,
              snr: info.snr, fr: info.fr,
            });
          }
        }
        unitColBySrc.push(m);
      }
      nUnits = unitsMeta.length;
      if (nUnits === 0) {
        // No units survived depth filter — fall back to bins so the user
        // gets *something*, with a clear note via granularity field.
        useUnits = false;
      }
    }

    if (!useUnits) {
      nUnits = Math.max(4, Math.min(64, Math.round((dHi - dLo) / 100)));
      binDw  = (dHi - dLo) / nUnits;
      for (let b = 0; b < nUnits; b++) {
        unitsMeta.push({ sourceIdx: -1, unitId: null,
                         depth: dLo + (b + 0.5) * binDw,
                         snr: null, fr: null });
      }
    }

    const dim1 = [], dim2 = [], y = [];
    let skipped = 0, total = 0;
    const popRows = [];

    for (let s = 0; s < this.sources.length; s++) {
      const src = this.sources[s];
      const dg  = src.dg;
      const alignCol = dg.getList(this.alignTo);
      const srcCol   = dg.getList('spike_src_trial');
      const filtCol  = twoWay ? dg.getList(this.filterBy) : null;
      const subsetCol = subsetByLegacyFilter ? dg.getList(this.filterBy) : null;
      const subsetVal = subsetByLegacyFilter ? String(this.filterValue) : null;
      if (!alignCol || !srcCol) continue;
      if (twoWay && !filtCol) continue;
      if (subsetByLegacyFilter && !subsetCol) continue;
      const miss = src.spikeMissing;
      const colMap = useUnits ? unitColBySrc[s] : null;
      const cache = new Map();
      const ntr = src.ntrials;
      for (let i = 0; i < ntr; i++) {
        total++;
        if (subsetCol && String(subsetCol.data[i]) !== subsetVal) { skipped++; continue; }
        if (!this._trialPasses(src, i)) { skipped++; continue; }
        const groupVal = grouping.getValueForTrial(src, i);
        if (groupVal == null) { skipped++; continue; }
        const align = Number(alignCol.data[i]);
        if (!Number.isFinite(align)) { skipped++; continue; }
        const srcId = Number(srcCol.data[i]) | 0;
        let entry = cache.get(srcId);
        if (!entry) {
          entry = {
            T: getSublistData(dg, 'spike_times', srcId),
            D: getSublistData(dg, 'spike_depth', srcId),
            U: useUnits ? getSublistData(dg, 'spike_unit', srcId) : null,
          };
          cache.set(srcId, entry);
        }
        const spkT = entry.T, spkD = entry.D, spkU = entry.U;
        if (!spkT) { skipped++; continue; }

        const row = new Float32Array(nUnits);
        let count = 0;
        for (let k = 0; k < spkT.length; k++) {
          const at = spkT[k] - align;
          if (at < tMin || at >= tMax) continue;
          let col;
          if (useUnits) {
            const uid = spkU[k];
            col = colMap.get(uid);
            if (col == null) continue;   // unit filtered out by depth
          } else {
            const d = spkD ? spkD[k] : 0;
            if (d <= miss || d < dLo || d >= dHi) continue;
            col = Math.min(nUnits - 1, ((d - dLo) / binDw) | 0);
          }
          count++;
          row[col] += 1;
        }
        // Counts → rate (spikes/sec).
        for (let b = 0; b < nUnits; b++) row[b] /= tWinSec;

        dim1.push(groupVal);
        if (twoWay) dim2.push(String(filtCol.data[i]));
        y.push(count);
        popRows.push(row);
      }
    }
    const N = popRows.length;
    const X = new Float32Array(N * nUnits);
    for (let i = 0; i < N; i++) X.set(popRows[i], i * nUnits);

    return {
      dim1,
      dim2: twoWay ? dim2 : null,
      y,
      X, shape: [N, nUnits],
      nUnits,
      granularity: useUnits ? 'unit' : 'depth_bin',
      unitsMeta,
      skipped, total,
      twoWay,
      dim1Name: grouping.dim1Name,
      dim2Name: twoWay ? this.filterBy : null,
      windowMs: [tMin, tMax],
      depthRange: [dLo, dHi],
    };
  },

  _showAnalysisHTML(html) {
    document.getElementById('analysisContent').innerHTML = html;
    document.getElementById('analysisPanel').classList.add('active');
  },

  // Close + clear the analysis panel. Called whenever an input that the
  // last analysis depended on changes (factor, align, window, depth,
  // filters, view mode, source) — keeping a stale F/p/η² visible above
  // a freshly-changed view is exactly the misleading-result trap we want
  // to avoid. NOT called for visual-only changes (per-panel scale).
  _invalidateAnalysisPanel() {
    const panel = document.getElementById('analysisPanel');
    if (!panel || !panel.classList.contains('active')) return;
    panel.classList.remove('active');
    document.getElementById('analysisContent').innerHTML = '';
  },

  _setAnalysisBusy(busy, label) {
    for (const id of ['btnAnalyzeANOVA', 'btnAnalyzeOverTime']) {
      const b = document.getElementById(id);
      if (b) b.disabled = busy;
    }
    if (busy && label) this._flashStatus(label);
  },

  _fmtP(p) {
    if (p == null || !Number.isFinite(p)) return '—';
    if (p < 1e-4) return p.toExponential(2);
    return p.toFixed(4);
  },

  async _runANOVA() {
    let inp;
    try { inp = this._buildAnalysisInputs(); }
    catch (e) { this._showAnalysisHTML(`<div class="err">${e.message}</div>`); return; }
    if (inp.y.length < 4) {
      this._showAnalysisHTML(`<div class="err">only ${inp.y.length} usable trials</div>`);
      return;
    }
    this._setAnalysisBusy(true, 'loading analysis kernel…');
    const wayLabel = inp.twoWay ? 'two-way' : 'one-way';
    const titleEffects = inp.twoWay
      ? `${inp.dim1Name}, ${inp.dim2Name}, and interaction`
      : inp.dim1Name;
    this._showAnalysisHTML(`<h3>Quantifying selectivity…</h3>
      <div class="muted">N = ${inp.y.length} trials · window ${inp.windowMs[0]}–${inp.windowMs[1]} ms · depth ${inp.depthRange[0].toFixed(0)}–${inp.depthRange[1].toFixed(0)} µm</div>`);
    try {
      const res = await PyodideAnalysis.anova(
        { dim1: inp.dim1, dim2: inp.dim2, y: inp.y },
        { dim1Name: inp.dim1Name, dim2Name: inp.dim2Name,
          responseName: `spikes in [${inp.windowMs[0]},${inp.windowMs[1]}] ms` });
      const rows = (res.effects || []).map(e => {
        const sig = e.p < 0.05 ? ' class="sig"' : '';
        return `<tr${sig}>
          <td>${e.name}</td>
          <td>${e.F.toFixed(3)}</td>
          <td>${e.df}</td>
          <td>${e.df_resid}</td>
          <td>${this._fmtP(e.p)}</td>
          <td>${e.partial_eta2.toFixed(4)}</td>
        </tr>`;
      }).join('');
      const note = res.note ? `<div class="err">${res.note}</div>` : '';
      const levelStr = inp.twoWay
        ? `levels: ${inp.dim1Name}=${res.n_levels.dim1}, ${inp.dim2Name}=${res.n_levels.dim2}`
        : `levels: ${inp.dim1Name}=${res.n_levels.dim1}`;
      const filterStr = this._activeFiltersDescription();
      const filterRow = filterStr
        ? `<div class="row muted"><span>filters: ${filterStr}</span></div>` : '';
      this._showAnalysisHTML(`
        <h3>${wayLabel.charAt(0).toUpperCase()+wayLabel.slice(1)} ANOVA — selectivity for ${titleEffects}</h3>
        <div class="row muted">
          <span>N = ${res.n} trials</span>
          <span>${levelStr}</span>
          <span>response: spike count in [${inp.windowMs[0]},${inp.windowMs[1]}] ms, depth ${inp.depthRange[0].toFixed(0)}–${inp.depthRange[1].toFixed(0)} µm</span>
        </div>
        ${filterRow}
        ${note}
        <table>
          <thead><tr><th>effect</th><th>F</th><th>df</th><th>df<sub>resid</sub></th><th>p</th><th>partial η²</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
        <div class="muted" style="margin-top:6px;">all factors treated as categorical · significant rows (p&lt;0.05) highlighted · p uncorrected for multiple comparisons.</div>
      `);
    } catch (e) {
      this._showAnalysisHTML(`<div class="err">analysis failed: ${e.message}</div>`);
    } finally {
      this._setAnalysisBusy(false);
    }
  },

  // Time-resolved version of _buildAnalysisInputs. Returns a 3D
  // (N_trials × N_units × N_timebins) firing-rate array. Each timebin
  // is a sliding W-ms window stepped every S ms across [winPre, winPost].
  // Reuses the same unit-vs-depth-bin granularity logic.
  _buildAnalysisInputsTimeResolved(opts) {
    const W = opts?.windowMs ?? 50;
    const S = opts?.stepMs ?? 10;
    if (!this.sources.length) throw new Error('no data loaded');
    const grouping = this._resolveAnalysisGrouping();
    // Same view-aware logic as the aggregate builder. Matrix = 1-way on
    // rastsBy, subset trials by filterBy/filterValue. Summary = 2-way.
    // Spatial = 1-way on (x, y).
    const twoWay = this.mode === 'summary'
      && !!this.filterBy && this.filterBy !== this.rastsBy;
    if (this.mode === 'summary'
        && this.filterBy && this.filterBy === this.rastsBy) {
      throw new Error('rows and cols must be different columns');
    }
    const subsetByLegacyFilter =
      (this.mode !== 'summary' && this.mode !== 'spatial')
      && !!this.filterBy && this.filterValue !== '';
    const tMin = this.winPre, tMax = this.winPost;
    if (!(tMax - tMin >= W)) throw new Error(`window ${tMax-tMin} ms < bin width ${W} ms`);
    const dLo = this.depthLo, dHi = this.depthHi;
    if (!(dHi > dLo)) throw new Error('depth range is empty');

    // Bin centers: tMin + W/2 + k*S for k = 0,1,...
    const T = Math.floor((tMax - tMin - W) / S) + 1;
    const times = new Array(T);
    for (let k = 0; k < T; k++) times[k] = tMin + W/2 + k*S;
    const Wsec = W / 1000;

    // Granularity detection (same as _buildAnalysisInputs).
    let useUnits = true;
    for (const src of this.sources) {
      if (!src.dg.getList('spike_unit')) { useUnits = false; break; }
    }
    const unitsMeta = [];
    const unitColBySrc = [];
    let nUnits = 0, binDw = 0;
    if (useUnits) {
      for (let s = 0; s < this.sources.length; s++) {
        const lookup = this.sources[s].unitLookup;
        const m = new Map();
        if (lookup) {
          const entries = [...lookup.entries()].sort(
            (a, b) => Number(a[1].depth) - Number(b[1].depth));
          for (const [uid, info] of entries) {
            const d = Number(info.depth);
            if (!Number.isFinite(d) || d < dLo || d >= dHi) continue;
            m.set(uid, unitsMeta.length);
            unitsMeta.push({ sourceIdx: s, unitId: uid, depth: d,
                             snr: info.snr, fr: info.fr });
          }
        }
        unitColBySrc.push(m);
      }
      nUnits = unitsMeta.length;
      if (nUnits === 0) useUnits = false;
    }
    if (!useUnits) {
      nUnits = Math.max(4, Math.min(64, Math.round((dHi - dLo) / 100)));
      binDw  = (dHi - dLo) / nUnits;
      for (let b = 0; b < nUnits; b++) {
        unitsMeta.push({ sourceIdx: -1, unitId: null,
                         depth: dLo + (b + 0.5) * binDw,
                         snr: null, fr: null });
      }
    }

    const dim1 = [], dim2 = [];
    let skipped = 0, total = 0;
    // Build trial rows in a list (we don't know N up front), then flatten
    // to row-major X[n*U*T + u*T + t]. Each row is a Float32Array of U*T.
    const rows = [];
    for (let s = 0; s < this.sources.length; s++) {
      const src = this.sources[s];
      const dg  = src.dg;
      const alignCol = dg.getList(this.alignTo);
      const srcCol   = dg.getList('spike_src_trial');
      const filtCol  = twoWay ? dg.getList(this.filterBy) : null;
      const subsetCol = subsetByLegacyFilter ? dg.getList(this.filterBy) : null;
      const subsetVal = subsetByLegacyFilter ? String(this.filterValue) : null;
      if (!alignCol || !srcCol) continue;
      if (twoWay && !filtCol) continue;
      if (subsetByLegacyFilter && !subsetCol) continue;
      const miss = src.spikeMissing;
      const colMap = useUnits ? unitColBySrc[s] : null;
      const cache = new Map();
      const ntr = src.ntrials;
      for (let i = 0; i < ntr; i++) {
        total++;
        if (subsetCol && String(subsetCol.data[i]) !== subsetVal) { skipped++; continue; }
        if (!this._trialPasses(src, i)) { skipped++; continue; }
        const groupVal = grouping.getValueForTrial(src, i);
        if (groupVal == null) { skipped++; continue; }
        const align = Number(alignCol.data[i]);
        if (!Number.isFinite(align)) { skipped++; continue; }
        const srcId = Number(srcCol.data[i]) | 0;
        let entry = cache.get(srcId);
        if (!entry) {
          entry = {
            T: getSublistData(dg, 'spike_times', srcId),
            D: getSublistData(dg, 'spike_depth', srcId),
            U: useUnits ? getSublistData(dg, 'spike_unit', srcId) : null,
          };
          cache.set(srcId, entry);
        }
        const spkT = entry.T, spkD = entry.D, spkU = entry.U;
        if (!spkT) { skipped++; continue; }

        // Per-trial row of length U*T (counts; rate-converted at end).
        const row = new Float32Array(nUnits * T);
        for (let k = 0; k < spkT.length; k++) {
          const at = spkT[k] - align;
          // Spike falls in any timebin t whose window [tMin+t*S, tMin+t*S+W]
          // contains `at`: tLo = ceil((at - tMin - W)/S); tHi = floor((at - tMin)/S)
          const tLoRaw = Math.floor((at - tMin - W) / S) + 1;
          const tHi    = Math.floor((at - tMin) / S);
          if (tHi < 0 || tLoRaw >= T) continue;
          const tLo = Math.max(0, tLoRaw);
          const tHiC = Math.min(T - 1, tHi);
          if (tLo > tHiC) continue;
          let col;
          if (useUnits) {
            const uid = spkU[k];
            col = colMap.get(uid);
            if (col == null) continue;
          } else {
            const d = spkD ? spkD[k] : 0;
            if (d <= miss || d < dLo || d >= dHi) continue;
            col = Math.min(nUnits - 1, ((d - dLo) / binDw) | 0);
          }
          const base = col * T;
          for (let tb = tLo; tb <= tHiC; tb++) row[base + tb]++;
        }
        // Counts → spikes/sec (each bin spans W ms).
