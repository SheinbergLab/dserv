        for (let q = 0; q < row.length; q++) row[q] /= Wsec;

        dim1.push(groupVal);
        if (twoWay) dim2.push(String(filtCol.data[i]));
        rows.push(row);
      }
    }
    const N = rows.length;
    const X3d = new Float32Array(N * nUnits * T);
    for (let i = 0; i < N; i++) X3d.set(rows[i], i * nUnits * T);

    return {
      X3d, shape: [N, nUnits, T], times,
      dim1, dim2: twoWay ? dim2 : null,
      nUnits, nTimes: T, windowMs: W, stepMs: S,
      granularity: useUnits ? 'unit' : 'depth_bin',
      unitsMeta,
      skipped, total,
      twoWay,
      dim1Name: grouping.dim1Name,
      dim2Name: twoWay ? this.filterBy : null,
      analysisWindowMs: [tMin, tMax],
      depthRange: [dLo, dHi],
    };
  },

  // General-purpose trace canvas: line traces + optional shaded
  // percentile bands per trace. Each trace: {label, color, values,
  // band?: {lo:[], hi:[]}}. yMax sets the y-axis ceiling; the y-axis
  // label and chance-line are configurable.
  _renderTimeTraces(canvas, times, traces, opts) {
    const o = opts || {};
    const yMax = o.yMax ?? 1.0;
    const yLabel = o.yLabel ?? 'value';
    const alignToLabel = o.alignToLabel ?? 'event';
    const chanceLine = o.chanceLine;   // number or null
    const height = o.height ?? 200;
    const W = canvas.width = 720, H = canvas.height = height;
    const ctx = canvas.getContext('2d');
    const PAD_L = 50, PAD_R = 12, PAD_T = 10, PAD_B = 26;
    const plotW = W - PAD_L - PAD_R, plotH = H - PAD_T - PAD_B;
    ctx.fillStyle = '#0a0e17'; ctx.fillRect(0, 0, W, H);
    const tMin = times[0], tMax = times[times.length - 1];
    const tRange = (tMax - tMin) || 1;
    const xOf = t => PAD_L + ((t - tMin) / tRange) * plotW;
    const yOf = v => PAD_T + (1 - Math.max(0, Math.min(1, v / yMax))) * plotH;
    // gridlines
    const yTicks = [0, 0.25, 0.5, 0.75, 1].map(f => f * yMax);
    ctx.strokeStyle = '#1a2236'; ctx.lineWidth = 1;
    ctx.font = '10px "JetBrains Mono"';
    ctx.fillStyle = '#5a6b85'; ctx.textAlign = 'right';
    for (const v of yTicks) {
      const y = yOf(v);
      ctx.beginPath(); ctx.moveTo(PAD_L, y); ctx.lineTo(W - PAD_R, y); ctx.stroke();
      ctx.fillText(v < 0.01 ? '0' : v.toFixed(yMax < 0.5 ? 2 : 2), PAD_L - 4, y + 3);
    }
    // x ticks
    ctx.textAlign = 'center';
    const xTicks = 6;
    for (let i = 0; i <= xTicks; i++) {
      const t = tMin + (i / xTicks) * tRange;
      const x = xOf(t);
      ctx.strokeStyle = '#1a2236';
      ctx.beginPath(); ctx.moveTo(x, PAD_T); ctx.lineTo(x, H - PAD_B); ctx.stroke();
      ctx.fillStyle = '#5a6b85';
      ctx.fillText(t.toFixed(0), x, H - PAD_B + 14);
    }
    // alignment line (t=0)
    if (0 >= tMin && 0 <= tMax) {
      const x0 = xOf(0);
      ctx.strokeStyle = 'rgba(251,191,36,0.6)';
      ctx.setLineDash([4, 3]);
      ctx.beginPath(); ctx.moveTo(x0, PAD_T); ctx.lineTo(x0, H - PAD_B); ctx.stroke();
      ctx.setLineDash([]);
    }
    // chance / threshold line
    if (chanceLine != null) {
      ctx.strokeStyle = 'rgba(248,113,113,0.5)';
      ctx.setLineDash([2, 2]);
      ctx.beginPath(); ctx.moveTo(PAD_L, yOf(chanceLine)); ctx.lineTo(W - PAD_R, yOf(chanceLine)); ctx.stroke();
      ctx.setLineDash([]);
    }
    // Per-trace baseline reference (e.g. pre-stim noise floor). Drawn in
    // the trace's color so it's unambiguous which trace it corresponds to.
    for (const tr of traces) {
      if (tr.baseline == null || !Number.isFinite(tr.baseline)) continue;
      ctx.strokeStyle = tr.color + 'aa';
      ctx.setLineDash([3, 3]);
      ctx.beginPath();
      const yb = yOf(tr.baseline);
      ctx.moveTo(PAD_L, yb); ctx.lineTo(W - PAD_R, yb); ctx.stroke();
      ctx.setLineDash([]);
    }
    // axis labels
    ctx.fillStyle = '#8899b4'; ctx.font = '10px "JetBrains Mono"';
    ctx.textAlign = 'center';
    ctx.fillText(`time vs ${alignToLabel} (ms)`, PAD_L + plotW / 2, H - 4);
    ctx.save();
    ctx.translate(12, PAD_T + plotH / 2); ctx.rotate(-Math.PI / 2);
    ctx.fillText(yLabel, 0, 0);
    ctx.restore();
    // shaded percentile bands first (so lines paint on top)
    for (const tr of traces) {
      if (!tr.band) continue;
      ctx.fillStyle = tr.color + '33';   // ~20% alpha hex
      ctx.beginPath();
      for (let i = 0; i < times.length; i++) {
        const x = xOf(times[i]);
        const y = yOf(tr.band.hi[i]);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      for (let i = times.length - 1; i >= 0; i--) {
        const x = xOf(times[i]);
        const y = yOf(tr.band.lo[i]);
        ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.fill();
    }
    // traces
    ctx.lineWidth = 1.8;
    for (const tr of traces) {
      ctx.strokeStyle = tr.color;
      ctx.beginPath();
      for (let i = 0; i < times.length; i++) {
        const x = xOf(times[i]);
        const y = yOf(tr.values[i]);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
    // legend — flow horizontally, wrapping when the next entry would
    // overrun the plot width. Keeps short legends on one line and lets
    // many-trace cases (depth bands) stack neatly.
    ctx.font = '11px "JetBrains Mono"';
    ctx.textAlign = 'left';
    const LEG_X0 = PAD_L + 8;
    const LEG_X_MAX = W - PAD_R - 8;
    const LEG_LINE_H = 14;
    let lx = LEG_X0, ly = PAD_T + 14;
    for (const tr of traces) {
      const w = 16 + ctx.measureText(tr.label).width;
      if (lx > LEG_X0 && lx + w > LEG_X_MAX) {
        lx = LEG_X0;
        ly += LEG_LINE_H;
      }
      ctx.fillStyle = tr.color;
      ctx.fillRect(lx, ly - 8, 12, 10);
      ctx.fillStyle = '#e2e8f0';
      ctx.fillText(tr.label, lx + 16, ly);
      lx += w + 16;
    }
  },

  async _runSelectivityOverTime() {
    let inp;
    try { inp = this._buildAnalysisInputsTimeResolved({ windowMs: 50, stepMs: 10 }); }
    catch (e) { this._showAnalysisHTML(`<div class="err">${e.message}</div>`); return; }
    if (inp.dim1.length < 8) {
      this._showAnalysisHTML(`<div class="err">only ${inp.dim1.length} usable trials</div>`);
      return;
    }
    const granLabel = inp.granularity === 'unit' ? 'sorted units' : 'depth-bin units';
    this._setAnalysisBusy(true, 'loading analysis kernel…');
    this._showAnalysisHTML(`<h3>η² over time…</h3>
      <div class="muted">${inp.dim1.length} trials × ${inp.nUnits} ${granLabel} × ${inp.nTimes} timebins (${inp.windowMs} ms window, ${inp.stepMs} ms step)</div>`);
    try {
      const t0 = performance.now();
      const res = await PyodideAnalysis.anovaOverTime(
        inp.X3d, inp.dim1,
        { shape: inp.shape, dim2: inp.dim2 });
      const ms = Math.round(performance.now() - t0);
      if (res.note) {
        this._showAnalysisHTML(`<div class="err">${res.note}</div>`);
        return;
      }
      const niceName = n => n === 'dim1' ? inp.dim1Name
                          : n === 'dim2' ? inp.dim2Name
                          : `${inp.dim1Name} × ${inp.dim2Name}`;
      const colors = { 'dim1': '#7dd3fc', 'dim2': '#a78bfa', 'dim1:dim2': '#fbbf24' };

      // Per-effect pre-stim baseline (q50) and pre-stim noise floor for
      // latency thresholding (MAD over the same pre-stim window). Using
      // MAD instead of σ keeps the threshold robust if a single early bin
      // happens to be high.
      const preIdx = inp.times
        .map((t, i) => (t < 0 ? i : -1))
        .filter(i => i >= 0);
      const median = (arr) => {
        const v = arr.filter(x => Number.isFinite(x)).slice().sort((a,b) => a-b);
        if (v.length === 0) return null;
        const m = v.length >> 1;
        return v.length % 2 ? v[m] : 0.5 * (v[m-1] + v[m]);
      };
      // For the "noise floor" we use the *empirical envelope* of pre-stim
      // q50 — not MAD/SD. Reason: with hundreds of units pooled per band,
      // q50 is heavily smoothed and MAD across pre-stim timebins becomes
      // tiny, so even a sub-percent post-stim wiggle would trip. The 95th
      // percentile of the pre-stim q50 trace says "the median rarely
      // exceeded this value before stim_on" — a clean, intuitive threshold
      // that scales with how noisy the pre-stim period actually was.
      const percentileOf = (arr, p) => {
        const v = arr.filter(x => Number.isFinite(x)).slice().sort((a,b) => a-b);
        if (v.length === 0) return null;
        const idx = (v.length - 1) * (p / 100);
        const lo = Math.floor(idx), hi = Math.ceil(idx);
        if (lo === hi) return v[lo];
        return v[lo] + (idx - lo) * (v[hi] - v[lo]);
      };
      const summarizeBaseline = (q50) => {
        if (preIdx.length === 0) return { med: null, thr: null };
        const pre = preIdx.map(i => q50[i]);
        return { med: median(pre), thr: percentileOf(pre, 95) };
      };
      // Latency = "time to 25% rise". Defined as the first post-stim bin
      // where q50 crosses max(pre-stim 95p, baseline + 0.25·(peak−baseline))
      // and stays above for ≥2 bins. Two halves of the threshold cover
      // the two failure modes:
      //   - pre-stim 95p stops weak/null traces from triggering on noise
      //   - 25%-of-peak stops STRONG traces from triggering on the tail of
      //     a slow ramp that begins almost at stim_on (the magenta band's
      //     trace can creep above noise within one bin while the visible
      //     rise hasn't really started yet).
      // We also require a meaningful peak (>= 1.5× baseline). Without
      // that, "lat" on a flat trace would just be the first bin where
      // sampling noise crosses the floor.
      //
      // We report the FULL spike-time window of the triggering bin —
      // [center − W/2, center + W/2] — not its center, and not just the
      // left edge. With a centered 50 ms window, a triggering bin
      // centered at t=35 ms includes spikes from 10–60 ms post-stim, and
      // any distribution of those spikes (early, late, or uniform) could
      // be driving the detected selectivity. The honest claim is "the
      // signal lives somewhere in 10–60 ms," not "response emerged at
      // 35 ms" or "from 10 ms onward."
      const SUSTAIN = 2;
      const HALF_W = inp.windowMs / 2;
      const crossingInterval = (q50, base) => {
        if (base == null || base.med == null) return null;
        // post-stim peak (NOT the all-time max — pre-stim outliers would
        // drag the 25% threshold too low for very weak signals).
        let peak = -Infinity;
        for (let i = 0; i < q50.length; i++) {
          if (inp.times[i] < 0) continue;
          const v = q50[i];
          if (Number.isFinite(v) && v > peak) peak = v;
        }
        if (!Number.isFinite(peak) || peak < base.med * 1.5) return null;
        const noiseFloor = base.thr ?? base.med;
        const riseFloor  = base.med + 0.25 * (peak - base.med);
        const thr = Math.max(noiseFloor, riseFloor);
        for (let i = 0; i < q50.length - SUSTAIN + 1; i++) {
          if (inp.times[i] < 0) continue;
          let ok = true;
          for (let k = 0; k < SUSTAIN; k++) {
            const v = q50[i + k];
            if (!Number.isFinite(v) || v <= thr) { ok = false; break; }
          }
          if (ok) return [inp.times[i] - HALF_W, inp.times[i] + HALF_W];
        }
        return null;
      };
      const fmtLat = (iv) => iv == null ? null
        : `${Math.round(iv[0])}–${Math.round(iv[1])} ms`;
      // Quantile across an array of arrays at a given t. Used for per-
      // band resampling: subset rows of eta_per_unit to a depth band, take
      // the per-time q25/q50/q75 across those rows.
      const percentile = (vals, p) => {
        const v = vals.filter(x => Number.isFinite(x)).slice().sort((a,b) => a-b);
        if (v.length === 0) return NaN;
        const idx = (v.length - 1) * (p / 100);
        const lo = Math.floor(idx), hi = Math.ceil(idx);
        if (lo === hi) return v[lo];
        return v[lo] + (idx - lo) * (v[hi] - v[lo]);
      };
      const quantilesForBand = (etaUT, unitIdxs) => {
        const T = inp.nTimes;
        const q25 = new Array(T), q50 = new Array(T), q75 = new Array(T);
        for (let t = 0; t < T; t++) {
          const col = unitIdxs.map(u => etaUT[u]?.[t]).filter(x => x != null);
          q25[t] = col.length ? percentile(col, 25) : NaN;
          q50[t] = col.length ? percentile(col, 50) : NaN;
          q75[t] = col.length ? percentile(col, 75) : NaN;
        }
        return { q25, q50, q75 };
      };

      // Decide per-band split: only meaningful in 1-way (otherwise we'd
      // have nBands × 3 effects = 12 traces, too crowded). Need eta_per_unit
      // from the kernel and at least 2*nBands sortable units.
      const NBANDS = 4;
      const canBand = !inp.twoWay
        && (res.effects || []).every(e => Array.isArray(e.eta_per_unit))
        && (inp.unitsMeta || []).length >= NBANDS * 2;
      // Build {band -> [unit indices]} from depth-sorted unitsMeta.
      let bandSpec = null;
      if (canBand) {
        const order = inp.unitsMeta
          .map((m, i) => ({ i, d: Number(m.depth) }))
          .filter(x => Number.isFinite(x.d))
          .sort((a, b) => a.d - b.d);
        const idx = order.map(x => x.i);
        const depthsSorted = order.map(x => x.d);
        const bands = [];
        for (let b = 0; b < NBANDS; b++) {
          const lo = Math.floor((b / NBANDS) * idx.length);
          const hi = Math.floor(((b + 1) / NBANDS) * idx.length);
          if (hi <= lo) continue;
          const bIdxs = idx.slice(lo, hi);
          const dLo = depthsSorted[lo];
          const dHi = depthsSorted[hi - 1];
          bands.push({ idxs: bIdxs, dLo, dHi, n: bIdxs.length });
        }
        bandSpec = bands;
      }
      // Cool→warm ramp for depth bands (superficial=cyan → deep=magenta).
      const bandColors = ['#7dd3fc', '#a78bfa', '#f472b6', '#fb7185'];

      // Build traces. With per-band split: one trace per (effect, band).
      // Without: original one-trace-per-effect behavior.
      const traces = [];
      const banded = canBand && bandSpec && bandSpec.length > 1;
      // Per-band traces drop the (constant) effect name from their label
      // — it's the same across all bands, named in the panel header. We
      // only have multiple effects in the 2-way case where banded=false,
      // so this is safe.
      for (const e of (res.effects || [])) {
        if (banded) {
          for (let b = 0; b < bandSpec.length; b++) {
            const sp = bandSpec[b];
            const { q25, q50, q75 } = quantilesForBand(e.eta_per_unit, sp.idxs);
            const baseInfo = summarizeBaseline(q50);
            const lat = crossingInterval(q50, baseInfo);
            const depthLabel = `${Math.round(sp.dLo)}–${Math.round(sp.dHi)} µm`;
            const latLabel = lat != null ? `lat ${fmtLat(lat)}` : 'lat —';
            traces.push({
              label: `${depthLabel} · n=${sp.n} · ${latLabel}`,
              color: bandColors[b % bandColors.length],
              values: q50,
              band: { lo: q25, hi: q75 },
              baseline: baseInfo.med,
              latency: lat,
            });
          }
        } else {
          const baseInfo = summarizeBaseline(e.q50);
          const lat = crossingInterval(e.q50, baseInfo);
          const latLabel = lat != null ? ` · lat ${fmtLat(lat)}` : '';
          traces.push({
            label: `${niceName(e.name)}${latLabel}`,
            color: colors[e.name] || '#5ba4f5',
            values: e.q50,
            band: { lo: e.q25, hi: e.q75 },
            baseline: baseInfo.med,
            latency: lat,
          });
        }
      }
      // Auto-scale y to band-hi; clamped to [0.05, 1.0] so weak/strong
      // effects both render legibly.
      let yMax = 0;
      for (const tr of traces) for (const v of tr.band.hi) {
        if (Number.isFinite(v) && v > yMax) yMax = v;
      }
      yMax = Math.max(0.05, Math.min(1.0, yMax * 1.1));
      const haveBaseline = traces.some(t => t.baseline != null);

      const wayLabel = inp.twoWay ? 'two-way' : 'one-way';
      const filterStr = this._activeFiltersDescription();
      const filterRow = filterStr
        ? `<div class="row muted"><span>filters: ${filterStr}</span></div>` : '';
      const bandedNote = (bandSpec && bandSpec.length > 1)
        ? `split into ${bandSpec.length} depth bands (${inp.unitsMeta.length} units sorted by depth, equal-count bins)`
        : 'population pooled across depth';
      this._showAnalysisHTML(`
        <h3>η² over time — ${wayLabel}</h3>
        <div class="row muted">
          <span>${inp.dim1.length} trials · ${inp.nUnits} ${granLabel} · ${inp.nTimes} timebins</span>
          <span>${inp.windowMs} ms window (centered), ${inp.stepMs} ms step · aligned to ${this.alignTo}</span>
          <span>fit in ${ms} ms</span>
        </div>
        ${filterRow}
        <div style="font-size:11px;color:#5ba4f5;font-weight:500;margin-top:6px;">median η² across units (25–75% band) · ${bandedNote}</div>
        <canvas id="atEtaTraces" style="width:720px;display:block;margin-top:2px;"></canvas>
        <div class="muted" style="margin-top:4px;">orange dashed: alignment event${haveBaseline ? ' · per-effect dashed line: pre-stim (t&lt;0) median, the empirical noise floor for that effect' : ''} · time labels are bin <em>centers</em> — a point at t=N includes spikes from t=N−${inp.windowMs/2} to t=N+${inp.windowMs/2} · latency = full spike-time window of the first bin whose q50 sustainably crosses max(pre-stim 95th pct, baseline + 25% of post-stim peak) for ${'≥2'} bins — the signal lives somewhere in the reported interval, no claim about distribution within it · η² under the null isn't zero (sparse-firing cells inflate it) — read real selectivity as the trace lifting <em>above its dashed baseline</em>, not above zero.</div>
      `);
      this._renderTimeTraces(
        document.getElementById('atEtaTraces'),
        inp.times, traces,
        { yMax, yLabel: 'median η²',
          alignToLabel: this.alignTo, height: 200, chanceLine: null });
    } catch (e) {
      this._showAnalysisHTML(`<div class="err">analysis failed: ${e.message}</div>`);
    } finally {
      this._setAnalysisBusy(false);
    }
  },

  _showSnippetFallback(snippet) {
    // Old browsers / file:// loads where clipboard isn't available
    console.log(snippet);
    alert('Clipboard unavailable; snippet logged to console.');
  },

  // Count how many units have a valid depth inside the current filter,
  // summed across all loaded sources (multi-bank totals make sense as a
  // single number once the depth filter is shared across the union axis).
  // Excludes sentinel-depth units (depth <= spikeMissing).
  unitsInDepthRange() {
    if (!this.sources || this.sources.length === 0) return 0;
    let n = 0;
    for (const src of this.sources) {
      for (const u of src.unitLookup.values()) {
        if (u.depth > src.spikeMissing &&
            u.depth >= this.depthLo && u.depth <= this.depthHi) n++;
      }
    }
    return n;
  },

  unitsTotal() {
    return this.sources.reduce((s, x) => s + x.unitLookup.size, 0);
  },

  // Build a (depth × time) mean-rate heatmap accumulator combining trials
  // from any number of sources. Each entry in cellEntries is
  // {sourceIdx, trialIdx}.
  //
  // Per-bin trial-count normalization: each depth-bin's spikes are
  // divided by the number of trials from sources whose depth range
  // INCLUDES that bin. This matters for combined banks: a depth bin in
  // bank_a's range only had a chance of getting spikes from bank_a's
  // trials, so naively dividing by total trials would halve the rate.
  _buildCombinedHeatmap(cellEntries, sourceState,
                        tMin, tMax, dLo, dHi, nDbins, nTbins) {
    const acc = new Float32Array(nDbins * nTbins);
    const tRange = (tMax - tMin) || 1;
    const dRange = (dHi - dLo) || 1;
    const binTw = tRange / nTbins;
    const binDw = dRange / nDbins;

    const nTrialsPerSource = new Array(this.sources.length).fill(0);

    for (let e = 0; e < cellEntries.length; e++) {
      const { sourceIdx, trialIdx } = cellEntries[e];
      const src = this.sources[sourceIdx];
      const state = sourceState[sourceIdx];
      const align = Number(state.alignData[trialIdx]);
      if (!Number.isFinite(align)) continue;
      const srcId = Number(state.srcData[trialIdx]) | 0;
      let cached = state.spikeCache.get(srcId);
      if (!cached) {
        cached = {
          T: getSublistData(src.dg, 'spike_times', srcId),
          D: getSublistData(src.dg, 'spike_depth', srcId),
        };
        state.spikeCache.set(srcId, cached);
      }
      const spkT = cached.T, spkD = cached.D;
      if (!spkT) continue;
      nTrialsPerSource[sourceIdx]++;
      const miss = src.spikeMissing;
      for (let k = 0; k < spkT.length; k++) {
        const at = spkT[k] - align;
        if (at < tMin || at >= tMax) continue;
        const d = spkD[k];
        if (d <= miss || d < dLo || d >= dHi) continue;
        const tbi = Math.min(nTbins - 1, ((at - tMin) / binTw) | 0);
        const dbi = Math.min(nDbins - 1, ((d - dLo) / binDw) | 0);
        acc[dbi * nTbins + tbi] += 1;
      }
    }

    // Per-depth-bin normalization (see header comment).
    const trialsPerDbin = new Int32Array(nDbins);
    for (let s = 0; s < this.sources.length; s++) {
      const sn = nTrialsPerSource[s];
      if (sn === 0) continue;
      const src = this.sources[s];
      const srcLo = Math.max(dLo, src.dataDepthMin);
      const srcHi = Math.min(dHi, src.dataDepthMax);
      if (srcLo >= srcHi) continue;
      const dbiLo = Math.max(0, Math.floor((srcLo - dLo) / binDw));
      const dbiHi = Math.min(nDbins, Math.ceil((srcHi - dLo) / binDw));
      for (let dbi = dbiLo; dbi < dbiHi; dbi++) {
        trialsPerDbin[dbi] += sn;
      }
    }
    for (let dbi = 0; dbi < nDbins; dbi++) {
      const n = trialsPerDbin[dbi];
      if (n > 0) {
        const rowOff = dbi * nTbins;
        for (let tbi = 0; tbi < nTbins; tbi++) acc[rowOff + tbi] /= n;
      }
    }

    let max = 0;
    for (let i = 0; i < acc.length; i++) if (acc[i] > max) max = acc[i];
    const totalN = nTrialsPerSource.reduce((s, x) => s + x, 0);
    return { acc, max, n: totalN };
  },

  // Build a (depth × time) mean-rate heatmap accumulator for the given
  // trial indices. Returns {acc, max, n}: acc is a Float32Array of length
  // nDbins*nTbins (depth-major), normalized to mean spikes per bin per
  // trial; max is its peak value; n is the trial count actually included.
  // Single-source variant — used by renderMatrix.
  _buildHeatmap(trialIndices, alignData, srcData, spikeCache,
                tMin, tMax, dLo, dHi, nDbins, nTbins) {
    const acc = new Float32Array(nDbins * nTbins);
    const tRange = (tMax - tMin) || 1;
    const dRange = (dHi - dLo) || 1;
    const binTw = tRange / nTbins;
    const binDw = dRange / nDbins;
    const miss = this.spikeMissing;
    const dg = this.dg;

    let n = 0;
    for (let ti = 0; ti < trialIndices.length; ti++) {
      const trialIdx = trialIndices[ti];
      const align = Number(alignData[trialIdx]);
      if (!Number.isFinite(align)) continue;
      const src = Number(srcData[trialIdx]) | 0;
      let entry = spikeCache.get(src);
      if (!entry) {
        entry = {
          T: getSublistData(dg, 'spike_times', src),
          D: getSublistData(dg, 'spike_depth', src),
        };
        spikeCache.set(src, entry);
      }
      const spkT = entry.T, spkD = entry.D;
      if (!spkT) continue;
      n++;
      for (let k = 0; k < spkT.length; k++) {
        const at = spkT[k] - align;
        if (at < tMin || at >= tMax) continue;
        const d = spkD[k];
        if (d <= miss || d < dLo || d >= dHi) continue;
        const tbi = Math.min(nTbins - 1, ((at - tMin) / binTw) | 0);
        const dbi = Math.min(nDbins - 1, ((d - dLo) / binDw) | 0);
        acc[dbi * nTbins + tbi] += 1;
      }
    }
    if (n > 0) {
      for (let i = 0; i < acc.length; i++) acc[i] /= n;
    }
    let max = 0;
    for (let i = 0; i < acc.length; i++) if (acc[i] > max) max = acc[i];
    return { acc, max, n };
  },

  // Paint a heatmap accumulator into a rectangle on the main canvas.
  //
  // Implementation: each call creates its OWN offscreen canvas at native
  // bin resolution (nTbins × nDbins), writes pixels via putImageData on
  // that local canvas, then drawImage-scales it onto the main canvas at
  // (x, y, w, h). Two reasons not to share or skip this layer:
  //
  //   1. A single shared offscreen canvas can race the GPU pipeline:
  //      successive drawImage reads can pick up the same texture upload,
  //      so cells get drawn with whichever cell's pixels won the race.
  //      A fresh canvas per call eliminates that aliasing entirely.
  //
  //   2. ctx.putImageData on the main canvas ignores the transform — on
  //      HiDPI displays it writes at half-position/half-size relative
  //      to CSS coordinates. ctx.drawImage DOES respect the transform,
  //      so going through it gives correct rendering on any DPR.
  //
  // The cost is small: ~40 small canvas allocations per render, well
  // under a millisecond total.
  _paintHeatmap(ctx, x, y, w, h, acc, scaleMax, nDbins, nTbins) {
    if (scaleMax <= 0) scaleMax = 1;
    const off = document.createElement('canvas');
    off.width = nTbins; off.height = nDbins;
    const offCtx = off.getContext('2d');
    const img = offCtx.createImageData(nTbins, nDbins);
    const data = img.data;
    for (let dbi = 0; dbi < nDbins; dbi++) {
      const flipped = nDbins - 1 - dbi;
      const rowOff = flipped * nTbins;
      for (let tbi = 0; tbi < nTbins; tbi++) {
        const raw = acc[rowOff + tbi] / scaleMax;
        const v = Math.sqrt(Math.max(0, Math.min(1, raw)));
        let r, g, b;
        if (v < 0.5) {
          const t = v * 2;
          r = (12 + t * 79)  | 0;
          g = (16 + t * 148) | 0;
          b = (24 + t * 221) | 0;
        } else {
          const t = (v - 0.5) * 2;
          r = (91  + t * 164) | 0;
          g = (164 + t * 91)  | 0;
          b = (245 + t * 10)  | 0;
        }
        const idx = (dbi * nTbins + tbi) * 4;
        data[idx]   = r;
        data[idx+1] = g;
        data[idx+2] = b;
        data[idx+3] = 255;
      }
    }
    offCtx.putImageData(img, 0, 0);
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(off, x, y, w, h);
  },

  // ─── Matrix view: columns = condition, rows = (mean signature) + each trial ───
  // Single big canvas, horizontally scrollable when many conditions. Mean
  // signature is a (depth × time) heatmap of mean spike count per bin
  // averaged across trials of that condition; per-trial rows below are
  // micro-rasters using identical x-axis so trial-to-mean and
  // trial-to-trial comparison reads visually.
  renderMatrix() {
    const dg = this.dg;
    if (!this.panels.length) return;
    if (!dg.getList(this.alignTo) || !dg.getList('spike_src_trial')) return;

    const filterDesc = this.filterBy
      ? ` · filtered to ${this.filterBy}=${this.filterValue}`
      : '';
    document.getElementById('status').textContent =
      `${this.panels.length} columns · grouped by ${this.rastsBy}${filterDesc} · aligned to ${this.alignTo} · ${this.unitsInDepthRange()}/${this.unitsTotal()} units in depth${this.sources.length > 1 ? ` · showing source 1/${this.sources.length} (${this.sources[0].filename}); switch to 2D summary to combine` : ''}`;

    // ── Geometry ───────────────────────────────────────────────────────
    const COL_W = 160, COL_GAP = 6;
    const HEAD_H = 26, SUMMARY_H = 130, SUMMARY_GAP = 6;
    const TRIAL_H = 30;
    const TIME_AXIS_H = 18;
    const LEFT = 60, TOP = 8, BOT = 8;

    const nCols = this.panels.length;
    const maxTrials = this.panels.reduce((m, p) => Math.max(m, p.trials.length), 0);

    const totalW = LEFT + nCols * (COL_W + COL_GAP) + COL_GAP;
    const summaryY1 = TOP + HEAD_H + SUMMARY_H;
    const trialsY0 = summaryY1 + SUMMARY_GAP;
    const trialsY1 = trialsY0 + maxTrials * TRIAL_H;
    const totalH = trialsY1 + TIME_AXIS_H + BOT;

    const canvas = document.getElementById('matrixCanvas');
    canvas.style.width = totalW + 'px';
    canvas.style.height = totalH + 'px';
    canvas.width = totalW * this.dpr;
    canvas.height = totalH * this.dpr;
    const ctx = canvas.getContext('2d');
    ctx.setTransform(this.dpr, 0, 0, this.dpr, 0, 0);
    ctx.imageSmoothingEnabled = false;

    // ── Window / depth / binning ───────────────────────────────────────
    const tMin = this.winPre, tMax = this.winPost;
    const tRange = (tMax - tMin) || 1;
    const dLo = this.depthLo, dHi = this.depthHi;
    const dRange = (dHi - dLo) || 1;
    const miss = this.spikeMissing;

    // Heatmap bins: chosen to yield comfortable pixel sizes inside SUMMARY_H
    const nTbins = Math.max(20, Math.min(120, Math.round(COL_W / 2.5)));
    const nDbins = Math.max(8,  Math.min(80,  Math.round(SUMMARY_H / 3)));
    const binTw = tRange / nTbins;
    const binDw = dRange / nDbins;

    // ── Pass 1: accumulate mean-signature heatmaps ─────────────────────
    const alignData = dg.getList(this.alignTo).data;
    const srcData = dg.getList('spike_src_trial').data;
    // Cache per-canonical-trial spike arrays (avoid repeated getSublistData)
    const spikeCache = new Map();
    const getSpikes = (src) => {
      let entry = spikeCache.get(src);
      if (!entry) {
        entry = {
          T: getSublistData(dg, 'spike_times', src),
          D: getSublistData(dg, 'spike_depth', src),
        };
        spikeCache.set(src, entry);
      }
      return entry;
    };

    const heatmaps = new Array(nCols);
    const perPanelMax = new Array(nCols);
    let globalMax = 0;
    for (let ci = 0; ci < nCols; ci++) {
      const panel = this.panels[ci];
      const acc = new Float32Array(nDbins * nTbins);
      const trials = panel.trials;
      for (let ti = 0; ti < trials.length; ti++) {
        const trialIdx = trials[ti];
        const align = Number(alignData[trialIdx]);
        if (!Number.isFinite(align)) continue;
        const src = Number(srcData[trialIdx]) | 0;
        const { T: spkT, D: spkD } = getSpikes(src);
        if (!spkT) continue;
        for (let k = 0; k < spkT.length; k++) {
          const at = spkT[k] - align;
          if (at < tMin || at >= tMax) continue;
          const d = spkD[k];
          if (d <= miss || d < dLo || d >= dHi) continue;
          const tbi = Math.min(nTbins - 1, ((at - tMin) / binTw) | 0);
          const dbi = Math.min(nDbins - 1, ((d - dLo) / binDw) | 0);
          acc[dbi * nTbins + tbi] += 1;
        }
      }
      // Mean per trial
      const n = Math.max(1, trials.length);
      for (let i = 0; i < acc.length; i++) acc[i] /= n;
      // Track per-panel and global maxima for color scaling.
      let pmax = 0;
      for (let i = 0; i < acc.length; i++) if (acc[i] > pmax) pmax = acc[i];
      perPanelMax[ci] = pmax;
      if (pmax > globalMax) globalMax = pmax;
      heatmaps[ci] = acc;
    }
    if (globalMax === 0) globalMax = 1;

    // ── Pass 2: render columns ─────────────────────────────────────────
    // Background
    ctx.fillStyle = '#0a0e17';
    ctx.fillRect(0, 0, totalW, totalH);

    // Left depth label region (just for the summary band)
    ctx.fillStyle = '#5a6b85';
    ctx.font = '10px "JetBrains Mono"';
    ctx.textAlign = 'right';
    ctx.fillText(`${dHi.toFixed(0)} µm`, LEFT - 6, TOP + HEAD_H + 8);
    ctx.fillText(`${dLo.toFixed(0)} µm`, LEFT - 6, summaryY1);
    ctx.fillText('mean', LEFT - 6, TOP + HEAD_H + SUMMARY_H / 2 + 4);
    // "trials" label
    ctx.fillText('trials', LEFT - 6, trialsY0 + 12);

    // (heatmap rendering uses _paintHeatmap which writes pixels directly
    // to the main canvas via putImageData — no shared offscreen buffer.)

    for (let ci = 0; ci < nCols; ci++) {
      const panel = this.panels[ci];
      const colX0 = LEFT + ci * (COL_W + COL_GAP) + COL_GAP;
      const colX1 = colX0 + COL_W;

      // Column header
      ctx.fillStyle = '#1a2236';
      ctx.fillRect(colX0, TOP, COL_W, HEAD_H);
      ctx.fillStyle = '#5ba4f5';
      ctx.font = '11px "JetBrains Mono"';
      ctx.textAlign = 'left';
      ctx.fillText(`${this.rastsBy}=${this.formatValue(panel.value)}`, colX0 + 6, TOP + 12);
      ctx.fillStyle = '#5a6b85';
      ctx.fillText(`n=${panel.trials.length}`, colX0 + 6, TOP + 22);

      // Mean-signature heatmap. Color scale: per-panel uses this column's
      // max, otherwise global. sqrt gamma + bilinear ramp inside the
      // shared _paintHeatmap helper.
      const acc = heatmaps[ci];
      const scaleMax = this.perPanelScale ? (perPanelMax[ci] || 1) : globalMax;
      this._paintHeatmap(ctx, colX0, TOP + HEAD_H, COL_W, SUMMARY_H,
                         acc, scaleMax, nDbins, nTbins);
      // border around heatmap
      ctx.strokeStyle = '#2a3654'; ctx.lineWidth = 1;
      ctx.strokeRect(colX0, TOP + HEAD_H, COL_W, SUMMARY_H);

      // Event line at t=0 across heatmap
      if (0 >= tMin && 0 <= tMax) {
        const x0 = colX0 + ((0 - tMin) / tRange) * COL_W;
        ctx.strokeStyle = 'rgba(251,191,36,0.6)';
        ctx.setLineDash([2, 2]);
        ctx.beginPath();
        ctx.moveTo(x0, TOP + HEAD_H);
        ctx.lineTo(x0, summaryY1);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      // Per-trial micro-rasters. Zebra-stripe the rows first so dense
      // ticks don't bleed visually into adjacent trials when the depth
      // filter is tight enough that there's no natural empty band.
      const trials = panel.trials;
      ctx.fillStyle = 'rgba(91,164,245,0.10)';
      for (let ti = 0; ti < trials.length; ti++) {
        if (ti % 2 === 1) {
          ctx.fillRect(colX0, trialsY0 + ti * TRIAL_H, COL_W, TRIAL_H);
        }
      }

      ctx.strokeStyle = 'rgba(229,231,235,0.65)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let ti = 0; ti < trials.length; ti++) {
        const trialIdx = trials[ti];
        const align = Number(alignData[trialIdx]);
        if (!Number.isFinite(align)) continue;
        const src = Number(srcData[trialIdx]) | 0;
        const { T: spkT, D: spkD } = getSpikes(src);
        if (!spkT) continue;

        const rowY0 = trialsY0 + ti * TRIAL_H + 1;
        const rowY1 = trialsY0 + (ti + 1) * TRIAL_H - 1;
        const rH = rowY1 - rowY0;

        for (let k = 0; k < spkT.length; k++) {
          const at = spkT[k] - align;
          if (at < tMin || at > tMax) continue;
          const d = spkD[k];
          if (d <= miss || d < dLo || d > dHi) continue;
          const x = colX0 + ((at - tMin) / tRange) * COL_W;
          const y = rowY0 + ((dHi - d) / dRange) * rH;
          ctx.moveTo(x, y - 0.6);
          ctx.lineTo(x, y + 0.6);
        }
      }
      ctx.stroke();

      // Trial-row backgrounds (subtle stripes) drawn UNDER ticks?
      // Actually drawn over — so use a faint border between rows instead.
      ctx.strokeStyle = 'rgba(42,54,84,0.4)';
      for (let ti = 1; ti < trials.length; ti++) {
        const y = trialsY0 + ti * TRIAL_H;
        ctx.beginPath();
        ctx.moveTo(colX0, y); ctx.lineTo(colX1, y);
        ctx.stroke();
      }
      // Outer column border for the trial block
      if (trials.length > 0) {
        ctx.strokeStyle = '#2a3654';
        ctx.strokeRect(colX0, trialsY0, COL_W, trials.length * TRIAL_H);
      }

      // Event line down the trial block
      if (0 >= tMin && 0 <= tMax && trials.length > 0) {
        const x0 = colX0 + ((0 - tMin) / tRange) * COL_W;
        ctx.strokeStyle = 'rgba(251,191,36,0.4)';
        ctx.setLineDash([2, 2]);
        ctx.beginPath();
        ctx.moveTo(x0, trialsY0); ctx.lineTo(x0, trialsY0 + trials.length * TRIAL_H);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      // Time axis (per column, just min/0/max)
      ctx.fillStyle = '#5a6b85';
      ctx.font = '9px "JetBrains Mono"';
      const axisY = trialsY1 + 12;
      ctx.textAlign = 'left';   ctx.fillText(`${tMin}`, colX0, axisY);
      ctx.textAlign = 'right';  ctx.fillText(`${tMax}`, colX1, axisY);
      ctx.textAlign = 'center';
      if (0 >= tMin && 0 <= tMax) {
        const x0 = colX0 + ((0 - tMin) / tRange) * COL_W;
        ctx.fillText('0', x0, axisY);
      }
    }

    // Footer: describe the color scale + gamma being used so the heatmap
    // intensity stays interpretable.
    ctx.fillStyle = '#5a6b85';
    ctx.font = '10px "JetBrains Mono"';
    ctx.textAlign = 'left';
    const scaleDesc = this.perPanelScale
      ? `each column scaled to its own max`
      : `0 → ${globalMax.toFixed(2)} spikes/bin · shared across columns`;
    ctx.fillText(
      `color: sqrt(intensity) · ${scaleDesc}`,
      LEFT, totalH - 2);
  },

  // ─── Overlay rendering: all matching trials' spikes drawn at low alpha ───
  // Per spike, we get its absolute obs-time (ms) and unit depth (µm).
  // Aligned time = spikeT - alignT[trialIdx]. Filter by window + depth.
  renderOverlay(ctx, panel, w, h) {
    const dg = this.dg;
    const m = { t: 4, r: 6, b: 22, l: 28 };
    const pW = w - m.l - m.r;
    const psthH = 18;
    const rasterY0 = m.t;
    const rasterY1 = h - m.b - psthH - 2;
    const rH = rasterY1 - rasterY0;
    const psthY0 = rasterY1 + 2;
    const psthY1 = h - m.b;
    const tMin = this.winPre, tMax = this.winPost;
    const dLo = this.depthLo, dHi = this.depthHi;
    const dRange = (dHi - dLo) || 1;
    const miss = this.spikeMissing;

    // bg
    ctx.fillStyle = '#0a0e17';
    ctx.fillRect(m.l, rasterY0, pW, rH);
    ctx.fillRect(m.l, psthY0, pW, psthY1 - psthY0);

    // axes
    const toX  = t => m.l + ((t - tMin) / (tMax - tMin)) * pW;
    const toYd = d => rasterY0 + ((dHi - d) / dRange) * rH;

    // 0-line in raster (event time)
    if (0 >= tMin && 0 <= tMax) {
      ctx.strokeStyle = 'rgba(251,191,36,0.5)';
      ctx.lineWidth = 1;
      ctx.setLineDash([2, 2]);
      ctx.beginPath();
      ctx.moveTo(toX(0), rasterY0); ctx.lineTo(toX(0), psthY1);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // PSTH bins
    const nBins = Math.max(40, Math.min(160, Math.round(pW / 2)));
    const bins = new Float32Array(nBins);
    const binW = (tMax - tMin) / nBins;

    // Spike ticks: collect all-trials-overlay into one path for one stroke.
    // Low alpha so density reads as darkness.
    ctx.strokeStyle = 'rgba(229,231,235,0.20)';
    ctx.lineWidth = 1;
    ctx.beginPath();

    // Pre-fetch alignment column data for speed
    const alignCol = dg.getList(this.alignTo);
    const alignData = alignCol && alignCol.data ? alignCol.data : null;
    if (!alignData) return;

    // Pre-fetch source-trial pointer once — we'll iterate canonical sublists.
    const srcCol = dg.getList('spike_src_trial');
    if (!srcCol || !srcCol.data) return;

    const trials = panel.trials;
    let drawn = 0;

    for (let ti = 0; ti < trials.length; ti++) {
      const trialIdx = trials[ti];
      const src = Number(srcCol.data[trialIdx]) | 0;
      const spkT = getSublistData(dg, 'spike_times', src);
      const spkD = getSublistData(dg, 'spike_depth', src);
      if (!spkT || spkT.length === 0) continue;
      const align = Number(alignData[trialIdx]);
      if (!Number.isFinite(align)) continue;

      for (let k = 0; k < spkT.length; k++) {
        const at = spkT[k] - align;          // ms, aligned to event
        if (at < tMin || at > tMax) continue;
        const d = spkD[k];
        if (d <= miss) continue;
        if (d < dLo || d > dHi) continue;
        const x = toX(at), y = toYd(d);
        ctx.moveTo(x, y - 0.8);
        ctx.lineTo(x, y + 0.8);
        // PSTH binning (matches the same filter)
        const bi = Math.min(nBins - 1, ((at - tMin) / binW) | 0);
        if (bi >= 0) bins[bi]++;
        drawn++;
      }
    }
    ctx.stroke();

    // Normalize PSTH to per-trial mean rate (Hz) for readability
    let hmax = 1;
    for (let i = 0; i < nBins; i++) if (bins[i] > hmax) hmax = bins[i];
    ctx.fillStyle = 'rgba(91,164,245,0.30)';
    ctx.strokeStyle = '#5ba4f5';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(m.l, psthY1);
    for (let i = 0; i < nBins; i++) {
      const x  = m.l + (i / nBins) * pW;
      const xn = m.l + ((i + 1) / nBins) * pW;
      const y  = psthY1 - (bins[i] / hmax) * (psthY1 - psthY0 - 1);
      ctx.lineTo(x, y); ctx.lineTo(xn, y);
    }
    ctx.lineTo(m.l + pW, psthY1);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Borders
    ctx.strokeStyle = '#2a3654';
    ctx.lineWidth = 1;
    ctx.strokeRect(m.l, rasterY0, pW, rH);
    ctx.strokeRect(m.l, psthY0, pW, psthY1 - psthY0);

    // Axis ticks (sparse, just min/max)
    ctx.fillStyle = '#5a6b85';
    ctx.font = '9px "JetBrains Mono"';
    ctx.textAlign = 'right';
    ctx.fillText(dHi.toFixed(0), m.l - 4, rasterY0 + 8);
    ctx.fillText(dLo.toFixed(0), m.l - 4, rasterY1 - 1);
    ctx.textAlign = 'left';
    ctx.fillText(`${tMin}`, m.l, psthY1 + 11);
    ctx.textAlign = 'right';
    ctx.fillText(`${tMax}`, m.l + pW, psthY1 + 11);
    ctx.textAlign = 'center';
    ctx.fillText('0', toX(0), psthY1 + 11);
  },

  // ─── Summary view: 2D grid of heatmap-only cells ───────────────────
  // Rows = unique values of filterBy (the "secondary" condition).
  // Cols = unique values of rastsBy (the "primary" condition).
  // Each cell: mean (depth × time) heatmap of trials matching both.
  // Click a row → set filter to that row's value, switch to matrix mode
  //              (so individual trials become visible for that slice).
  renderSummary() {
    const canvas = document.getElementById('matrixCanvas');
    if (!this.filterBy) {
      const ctx = canvas.getContext('2d');
      canvas.width = canvas.width;
      canvas.style.width = '100%';
      canvas.style.height = '0px';
      document.getElementById('status').textContent =
        'summary view needs a filter dimension; pick one in the toolbar.';
      this._summaryHit = null;
      return;
    }
    if (this.rastsBy === this.filterBy) {
      const ctx = canvas.getContext('2d');
      canvas.width = canvas.width;
      canvas.style.height = '0px';
      document.getElementById('status').textContent =
        `summary view needs two distinct dimensions; rows and cols are both '${this.rastsBy}'.`;
      this._summaryHit = null;
      return;
    }

    // Build per-source state: align/src column data, plus a fresh spike
    // cache. We assume all sources have the same column structure (same
    // protocol). Sources missing any required column are skipped.
    const sourceState = [];
    for (const src of this.sources) {
      const alignCol = src.dg.getList(this.alignTo);
      const srcCol   = src.dg.getList('spike_src_trial');
      const groupCol = src.dg.getList(this.rastsBy);
      const filtCol  = src.dg.getList(this.filterBy);
      if (!alignCol || !srcCol || !groupCol || !filtCol) {
        sourceState.push(null);
        continue;
      }
      sourceState.push({
        alignData: alignCol.data,
        srcData:   srcCol.data,
        groupCol, filtCol,
        spikeCache: new Map(),
      });
    }

    // Union row/col values across all sources (same protocol → same set).
    const sortVals = arr => arr.slice().sort((a, b) => {
      const av = Number(a), bv = Number(b);
      if (Number.isFinite(av) && Number.isFinite(bv)) return av - bv;
      return String(a).localeCompare(String(b));
    });
    const colSet = new Set(), rowSet = new Set();
    for (let s = 0; s < this.sources.length; s++) {
      const st = sourceState[s];
      if (!st) continue;
      const ntr = this.sources[s].ntrials;
      for (let i = 0; i < ntr; i++) {
        colSet.add(st.groupCol.data[i]);
        rowSet.add(st.filtCol.data[i]);
      }
    }
    const colVals = sortVals([...colSet]);
    let rowVals = sortVals([...rowSet]);
    // Y-flip: reverse row order so high values render at top.
    // Done before building rowIdx so the bucketing matches the rendered order.
    if (this.flipY) rowVals = rowVals.slice().reverse();

    // Bucket trials by (row, col) with source tagging — single pass per source.
    const cellTrials = new Map();   // "ri|ci" -> [{sourceIdx, trialIdx}, …]
    const rowCounts  = new Array(rowVals.length).fill(0);
    const rowIdx = new Map(rowVals.map((v, i) => [String(v), i]));
    const colIdx = new Map(colVals.map((v, i) => [String(v), i]));
    for (let s = 0; s < this.sources.length; s++) {
      const st = sourceState[s];
      if (!st) continue;
      const src = this.sources[s];
      const ntr = src.ntrials;
      for (let i = 0; i < ntr; i++) {
        if (!this._trialPasses(src, i)) continue;
        const ri = rowIdx.get(String(st.filtCol.data[i]));
        const ci = colIdx.get(String(st.groupCol.data[i]));
        if (ri == null || ci == null) continue;
        const key = ri + '|' + ci;
        let arr = cellTrials.get(key);
        if (!arr) { arr = []; cellTrials.set(key, arr); }
        arr.push({ sourceIdx: s, trialIdx: i });
        rowCounts[ri]++;
      }
    }

    // Geometry
    const CELL_W = 130, CELL_H = 80, CELL_GAP = 4;
    const HEAD_H = 28;          // column headers
    const ROW_LABEL_W = 90;     // left labels
    const TIME_AXIS_H = 18;     // bottom
    const LEFT_AXIS_W = 50;     // depth labels strip on the very left
    const TOP = 8, BOT = 8;

    const nCols = colVals.length, nRows = rowVals.length;
    const totalW = LEFT_AXIS_W + ROW_LABEL_W + nCols * (CELL_W + CELL_GAP) + CELL_GAP;
    const totalH = TOP + HEAD_H + nRows * (CELL_H + CELL_GAP) + TIME_AXIS_H + BOT;

    canvas.style.width = totalW + 'px';
    canvas.style.height = totalH + 'px';
    canvas.width = totalW * this.dpr;
    canvas.height = totalH * this.dpr;
    const ctx = canvas.getContext('2d');
    ctx.setTransform(this.dpr, 0, 0, this.dpr, 0, 0);
    ctx.imageSmoothingEnabled = false;

    // Window / depth / binning (same as matrix mode)
    const tMin = this.winPre, tMax = this.winPost;
    const tRange = (tMax - tMin) || 1;
    const dLo = this.depthLo, dHi = this.depthHi;
    const nTbins = Math.max(20, Math.min(80, Math.round(CELL_W / 3)));
    const nDbins = Math.max(8,  Math.min(60, Math.round(CELL_H / 2)));

    // Pass 1: build heatmap accumulators for every cell — multi-source
    // aware via _buildCombinedHeatmap, which does per-depth-bin trial-
    // count normalization so combining banks doesn't artificially halve
    // the apparent rate at depths only one bank covered.
    const heatmaps = new Array(nRows * nCols);
    let globalMax = 0;
    for (let ri = 0; ri < nRows; ri++) {
      for (let ci = 0; ci < nCols; ci++) {
        const entries = cellTrials.get(ri + '|' + ci) || [];
        const r = this._buildCombinedHeatmap(
          entries, sourceState, tMin, tMax, dLo, dHi, nDbins, nTbins);
        heatmaps[ri * nCols + ci] = r;
        if (r.max > globalMax) globalMax = r.max;
      }
    }
    if (globalMax === 0) globalMax = 1;

    // Pass 2: paint
    ctx.fillStyle = '#0a0e17';
    ctx.fillRect(0, 0, totalW, totalH);

    // Column headers
    ctx.font = '11px "JetBrains Mono"';
    for (let ci = 0; ci < nCols; ci++) {
      const cx0 = LEFT_AXIS_W + ROW_LABEL_W + ci * (CELL_W + CELL_GAP) + CELL_GAP;
      ctx.fillStyle = '#1a2236';
      ctx.fillRect(cx0, TOP, CELL_W, HEAD_H);
      ctx.fillStyle = '#5ba4f5';
      ctx.textAlign = 'left';
      ctx.fillText(`${this.rastsBy}=${this.formatValue(colVals[ci])}`, cx0 + 6, TOP + 18);
    }

    // Depth axis on the very left (one strip across all rows)
    const depthLabelTop = TOP + HEAD_H;
    const depthLabelBot = depthLabelTop + nRows * (CELL_H + CELL_GAP);
    ctx.fillStyle = '#5a6b85';
    ctx.font = '10px "JetBrains Mono"';
    ctx.textAlign = 'right';
    ctx.fillText(`${dHi.toFixed(0)} µm`, LEFT_AXIS_W - 4, depthLabelTop + 9);
    ctx.fillText(`${dLo.toFixed(0)} µm`, LEFT_AXIS_W - 4, depthLabelBot - 4);

    // Hit-rect table for click-drill (rebuilt each render)
    this._summaryHit = { rowVals, rows: [] };

    for (let ri = 0; ri < nRows; ri++) {
      const ry0 = TOP + HEAD_H + ri * (CELL_H + CELL_GAP);
      // Row label
      ctx.fillStyle = '#1a2236';
      ctx.fillRect(LEFT_AXIS_W, ry0, ROW_LABEL_W, CELL_H);
      ctx.fillStyle = '#e2e8f0';
      ctx.font = '11px "JetBrains Mono"';
      ctx.textAlign = 'left';
      ctx.fillText(this.filterBy, LEFT_AXIS_W + 6, ry0 + 16);
      ctx.fillStyle = '#5ba4f5';
      ctx.font = '12px "JetBrains Mono"';
      ctx.fillText(`= ${this.formatValue(rowVals[ri])}`, LEFT_AXIS_W + 6, ry0 + 32);
      ctx.fillStyle = '#5a6b85';
      ctx.font = '10px "JetBrains Mono"';
      ctx.fillText(`n=${rowCounts[ri]}`, LEFT_AXIS_W + 6, ry0 + 48);
      ctx.fillStyle = '#5ba4f5';
      ctx.font = '10px "JetBrains Mono"';
      ctx.fillText('› drill', LEFT_AXIS_W + 6, ry0 + 66);

      // Cells in this row
      for (let ci = 0; ci < nCols; ci++) {
        const cx0 = LEFT_AXIS_W + ROW_LABEL_W + ci * (CELL_W + CELL_GAP) + CELL_GAP;
        const { acc, max, n } = heatmaps[ri * nCols + ci];
        const scaleMax = this.perPanelScale ? (max || 1) : globalMax;
        if (n > 0) {
          this._paintHeatmap(ctx, cx0, ry0, CELL_W, CELL_H, acc, scaleMax, nDbins, nTbins);
        } else {
          // empty cell
          ctx.fillStyle = '#0a0e17';
          ctx.fillRect(cx0, ry0, CELL_W, CELL_H);
          ctx.fillStyle = '#5a6b85';
          ctx.font = '10px "JetBrains Mono"';
          ctx.textAlign = 'center';
          ctx.fillText('(none)', cx0 + CELL_W / 2, ry0 + CELL_H / 2 + 4);
        }
        // Cell border + event line
        ctx.strokeStyle = '#2a3654'; ctx.lineWidth = 1;
        ctx.strokeRect(cx0, ry0, CELL_W, CELL_H);
        if (0 >= tMin && 0 <= tMax) {
          const x0 = cx0 + ((0 - tMin) / tRange) * CELL_W;
          ctx.strokeStyle = 'rgba(251,191,36,0.5)';
          ctx.setLineDash([2, 2]);
          ctx.beginPath();
          ctx.moveTo(x0, ry0); ctx.lineTo(x0, ry0 + CELL_H);
          ctx.stroke();
          ctx.setLineDash([]);
        }
        // Tiny n badge
        ctx.fillStyle = 'rgba(10,14,23,0.7)';
        ctx.fillRect(cx0 + CELL_W - 28, ry0 + CELL_H - 12, 26, 10);
        ctx.fillStyle = '#8899b4';
        ctx.font = '9px "JetBrains Mono"';
        ctx.textAlign = 'right';
        ctx.fillText(`n=${n}`, cx0 + CELL_W - 4, ry0 + CELL_H - 4);
      }

      // Record hit-test rect for this row (entire span including label).
      this._summaryHit.rows.push({
        y0: ry0,
        y1: ry0 + CELL_H,
        rowValue: rowVals[ri],
      });
    }

    // Time axis at bottom (single, shared)
    ctx.fillStyle = '#5a6b85';
    ctx.font = '10px "JetBrains Mono"';
    const axisY = TOP + HEAD_H + nRows * (CELL_H + CELL_GAP) + 12;
    for (let ci = 0; ci < nCols; ci++) {
      const cx0 = LEFT_AXIS_W + ROW_LABEL_W + ci * (CELL_W + CELL_GAP) + CELL_GAP;
      ctx.textAlign = 'left';   ctx.fillText(`${tMin}`, cx0, axisY);
      ctx.textAlign = 'right';  ctx.fillText(`${tMax}`, cx0 + CELL_W, axisY);
      if (0 >= tMin && 0 <= tMax) {
        const x0 = cx0 + ((0 - tMin) / tRange) * CELL_W;
        ctx.textAlign = 'center';
        ctx.fillText('0', x0, axisY);
      }
    }

    // Status
    const scaleDesc = this.perPanelScale
      ? 'per-cell scale'
      : `0 → ${globalMax.toFixed(2)} spikes/bin · shared`;
    document.getElementById('status').textContent =
      `${nRows} rows (${this.filterBy}) × ${nCols} cols (${this.rastsBy}) · aligned to ${this.alignTo} · ${this.unitsInDepthRange()}/${this.unitsTotal()} units · ${this.sources.length > 1 ? this.sources.length + ' sources combined · ' : ''}color: sqrt · ${scaleDesc}`;
  },

  // ─── Spatial map view ──────────────────────────────────────────────
  // Places each (spatialX, spatialY) sample location's heatmap at its
  // real coordinate on a single canvas. Works for any sampling layout
  // (rect, hex, scatter) — we never assume a regular grid; we just plot
  // wherever the trial says the stimulus was. Y is "up positive" by
  // convention (canvas coordinates are flipped internally).
  //
  // Cell size is half the median nearest-neighbour spacing so adjacent
  // hex/grid cells touch but don't overlap. Multi-source trials at the
  // same (x, y) bucket together via _buildCombinedHeatmap, so a sparse
  // hex layout shows depth × time profile per real position.
  renderSpatialMap() {
    const canvas = document.getElementById('matrixCanvas');
    const ctx = canvas.getContext('2d');
    const setStatus = msg => document.getElementById('status').textContent = msg;

    if (!this.spatialX || !this.spatialY) {
      canvas.style.height = '0px';
      setStatus('spatial map needs an X and a Y column; pick a pair in the toolbar.');
      this._summaryHit = null;
      return;
    }

    // Collect (x, y) per trial across all sources, plus per-source align
    // and group state for the heatmap builder.
    const sourceState = [];
    for (const src of this.sources) {
      const alignCol = src.dg.getList(this.alignTo);
      const srcCol   = src.dg.getList('spike_src_trial');
      const xCol     = src.dg.getList(this.spatialX);
      const yCol     = src.dg.getList(this.spatialY);
      if (!alignCol || !srcCol || !xCol || !yCol) {
        sourceState.push(null); continue;
      }
      sourceState.push({
        alignData: alignCol.data, srcData: srcCol.data,
        xData: xCol.data, yData: yCol.data,
        spikeCache: new Map(),
      });
    }
    const anyOk = sourceState.some(s => s !== null);
    if (!anyOk) {
      canvas.style.height = '0px';
      setStatus(`spatial map: no source has both '${this.spatialX}' and '${this.spatialY}'.`);
      this._summaryHit = null;
      return;
    }

    // Bucket trials by (x, y). We round to a sensible precision so
    // floating-point jitter doesn't fragment cells; 4 decimals is safe
    // for degree-scale visual coords.
    const cellTrials = new Map();   // "x|y" -> [{sourceIdx, trialIdx}, …]
    const positions  = new Map();   // key -> {x, y}
    const roundKey = (x, y) =>
      `${Number(x).toFixed(4)}|${Number(y).toFixed(4)}`;
    for (let s = 0; s < this.sources.length; s++) {
      const st = sourceState[s];
      if (!st) continue;
      const src = this.sources[s];
      const ntr = src.ntrials;
      for (let i = 0; i < ntr; i++) {
        if (!this._trialPasses(src, i)) continue;
        const x = Number(st.xData[i]), y = Number(st.yData[i]);
        if (!Number.isFinite(x) || !Number.isFinite(y)) continue;
        const k = roundKey(x, y);
        if (!positions.has(k)) positions.set(k, { x, y });
        let arr = cellTrials.get(k);
        if (!arr) { arr = []; cellTrials.set(k, arr); }
        arr.push({ sourceIdx: s, trialIdx: i });
      }
    }

    if (positions.size === 0) {
      canvas.style.height = '0px';
      setStatus('spatial map: no trials match current filters.');
      this._summaryHit = null;
      return;
    }

    // Compute axis range and tile size from nearest-neighbour spacing.
    let xMin = Infinity, xMax = -Infinity, yMin = Infinity, yMax = -Infinity;
    const pts = [...positions.values()];
    for (const p of pts) {
      if (p.x < xMin) xMin = p.x; if (p.x > xMax) xMax = p.x;
      if (p.y < yMin) yMin = p.y; if (p.y > yMax) yMax = p.y;
    }
    // Median nearest-neighbour distance. O(N²) is fine for the dozens
    // of unique sampling points we typically have.
    const nn = [];
    for (let i = 0; i < pts.length; i++) {
      let best = Infinity;
      for (let j = 0; j < pts.length; j++) {
        if (i === j) continue;
        const dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d > 0 && d < best) best = d;
      }
      if (Number.isFinite(best)) nn.push(best);
    }
    nn.sort((a, b) => a - b);
    const medSpacing = nn.length ? nn[(nn.length / 2) | 0] : 1;

    // Geometry: pick a square data-pixel scale so a tile of `cellData`
    // wide in data space renders as `cellPx` wide on canvas. We size the
    // tile a bit smaller than the nearest-neighbour distance so adjacent
    // cells just touch without overlap.
    const MARGIN_L = 56, MARGIN_R = 16, MARGIN_T = 24, MARGIN_B = 36;
    // Heatmap aspect: time × depth. Use a tile aspect that respects this.
    const TILE_ASPECT = 1.4;   // wider than tall
    // Decide a target tile size in CSS px. Floor at 60×42 (≈ readable
    // heatmap), and choose the data→pixel scale so a tile of size
    // `medSpacing × medSpacing/TILE_ASPECT` data-units fits in tilePx.
    const MIN_TILE_W = 90, MIN_TILE_H = 64;
    const TILE_FRAC = 0.95;     // tile is this fraction of nn spacing
    const tileWdata = medSpacing * TILE_FRAC;
    const tileHdata = tileWdata / TILE_ASPECT;
    // Pixel scale: enough to make MIN_TILE_W satisfied at the smallest
    // permitted tile. Use the same scale on both axes (square data).
    const pxPerData = Math.max(MIN_TILE_W / tileWdata, MIN_TILE_H / tileHdata);

    const dataW = (xMax - xMin) + tileWdata;   // half-tile padding each side
    const dataH = (yMax - yMin) + tileHdata;
    const plotW = dataW * pxPerData;
    const plotH = dataH * pxPerData;
    const tilePxW = tileWdata * pxPerData;
    const tilePxH = tileHdata * pxPerData;

    const totalW = MARGIN_L + plotW + MARGIN_R;
    const totalH = MARGIN_T + plotH + MARGIN_B;

    canvas.style.width = totalW + 'px';
    canvas.style.height = totalH + 'px';
    canvas.width = totalW * this.dpr;
    canvas.height = totalH * this.dpr;
    ctx.setTransform(this.dpr, 0, 0, this.dpr, 0, 0);
    ctx.imageSmoothingEnabled = false;

    // Coordinate mapping: x grows right, y grows UP (canvas y inverted).
    const xToPx = (x) =>
      MARGIN_L + (x - xMin + tileWdata / 2) * pxPerData;
    const yToPx = (y) =>
      MARGIN_T + plotH - (y - yMin + tileHdata / 2) * pxPerData;

    // Heatmap binning (per cell).
    const tMin = this.winPre, tMax = this.winPost;
    const tRange = (tMax - tMin) || 1;
    const dLo = this.depthLo, dHi = this.depthHi;
    const nTbins = Math.max(20, Math.min(80, Math.round(tilePxW / 3)));
    const nDbins = Math.max(8,  Math.min(60, Math.round(tilePxH / 2)));

    // Pass 1: build heatmap accumulators for every populated cell.
    const heatmaps = new Map();   // key -> {acc, max, n}
    let globalMax = 0;
    for (const [key, entries] of cellTrials) {
      const r = this._buildCombinedHeatmap(
        entries, sourceState, tMin, tMax, dLo, dHi, nDbins, nTbins);
      heatmaps.set(key, r);
      if (r.max > globalMax) globalMax = r.max;
    }
    if (globalMax === 0) globalMax = 1;

    // Background.
    ctx.fillStyle = '#0a0e17';
    ctx.fillRect(0, 0, totalW, totalH);

    // Title strip / axis labels.
    ctx.fillStyle = '#e2e8f0';
    ctx.font = '11px "JetBrains Mono"';
    ctx.textAlign = 'left';
    ctx.fillText(`x: ${this.spatialX}`, MARGIN_L, MARGIN_T - 8);
    ctx.textAlign = 'right';
    ctx.fillText(`y: ${this.spatialY}`, totalW - MARGIN_R, MARGIN_T - 8);

    // Plot frame.
    ctx.strokeStyle = '#2a3654'; ctx.lineWidth = 1;
    ctx.strokeRect(MARGIN_L, MARGIN_T, plotW, plotH);

    // Axis ticks: min/0/max on each axis.
    ctx.fillStyle = '#5a6b85';
    ctx.font = '10px "JetBrains Mono"';
    const drawXTick = (val) => {
      const px = xToPx(val);
      ctx.beginPath(); ctx.strokeStyle = '#2a3654';
      ctx.moveTo(px, MARGIN_T + plotH); ctx.lineTo(px, MARGIN_T + plotH + 4); ctx.stroke();
      ctx.textAlign = 'center';
      ctx.fillText(this.formatValue(val), px, MARGIN_T + plotH + 16);
    };
    const drawYTick = (val) => {
      const py = yToPx(val);
      ctx.beginPath(); ctx.strokeStyle = '#2a3654';
      ctx.moveTo(MARGIN_L - 4, py); ctx.lineTo(MARGIN_L, py); ctx.stroke();
      ctx.textAlign = 'right';
      ctx.fillText(this.formatValue(val), MARGIN_L - 6, py + 4);
    };
    drawXTick(xMin); drawXTick(xMax);
    if (xMin < 0 && xMax > 0) drawXTick(0);
    drawYTick(yMin); drawYTick(yMax);
    if (yMin < 0 && yMax > 0) drawYTick(0);

    // Pass 2: paint each cell at its real (x, y) location.
    for (const [key, pos] of positions) {
      const cx = xToPx(pos.x);
      const cy = yToPx(pos.y);
      const x0 = cx - tilePxW / 2, y0 = cy - tilePxH / 2;
      const r = heatmaps.get(key);
      const scaleMax = this.perPanelScale ? (r.max || 1) : globalMax;
      if (r.n > 0) {
        this._paintHeatmap(ctx, x0, y0, tilePxW, tilePxH, r.acc, scaleMax, nDbins, nTbins);
      }
      ctx.strokeStyle = '#2a3654'; ctx.lineWidth = 1;
      ctx.strokeRect(x0, y0, tilePxW, tilePxH);
      // Event line at t=0
      if (0 >= tMin && 0 <= tMax) {
        const ex = x0 + ((0 - tMin) / tRange) * tilePxW;
        ctx.strokeStyle = 'rgba(251,191,36,0.5)';
        ctx.setLineDash([2, 2]);
        ctx.beginPath();
        ctx.moveTo(ex, y0); ctx.lineTo(ex, y0 + tilePxH);
        ctx.stroke();
        ctx.setLineDash([]);
      }
      // Tiny n badge in lower-right of tile
      ctx.fillStyle = 'rgba(10,14,23,0.7)';
      ctx.fillRect(x0 + tilePxW - 28, y0 + tilePxH - 12, 26, 10);
      ctx.fillStyle = '#8899b4';
      ctx.font = '9px "JetBrains Mono"';
      ctx.textAlign = 'right';
      ctx.fillText(`n=${r.n}`, x0 + tilePxW - 4, y0 + tilePxH - 4);
    }

    this._summaryHit = null;   // no per-row drill in spatial mode

    const scaleDesc = this.perPanelScale
      ? 'per-tile scale'
      : `0 → ${globalMax.toFixed(2)} spikes/bin · shared`;
    setStatus(
      `${positions.size} positions · x=${this.spatialX} (${xMin}→${xMax}) · ` +
      `y=${this.spatialY} (${yMin}→${yMax}) · aligned to ${this.alignTo} · ` +
      `${this.unitsInDepthRange()}/${this.unitsTotal()} units · ` +
      `${this.sources.length > 1 ? this.sources.length + ' sources combined · ' : ''}` +
      `tile=depth×time · ${scaleDesc}`);
  },

  // Click handler for the matrix canvas: in summary mode, hit-test which
  // row was clicked and drill into that filter value (matrix mode).
  _onMatrixCanvasClick(e) {
    if (this.mode !== 'summary' || !this._summaryHit) return;
    const canvas = document.getElementById('matrixCanvas');
    const rect = canvas.getBoundingClientRect();
    const y = e.clientY - rect.top;
    for (const r of this._summaryHit.rows) {
      if (y >= r.y0 && y <= r.y1) {
        // Set filter to this row's value, switch to matrix mode. Also
        // re-skin the toolbar — the second select changes meaning from
        // "rows" (hidden value-select) back to "filter = value" so the
        // user sees what they're now drilled into.
        this.filterValue = String(r.rowValue);
        document.getElementById('filterValue').value = this.filterValue;
        this.mode = 'matrix';
        document.getElementById('viewMode').value = 'matrix';
        this._updateToolbarLabels();
        this.refresh();
        return;
      }
    }
  },

  // ─── Drilldown: stacked individual trials of one panel ───
  enterDrilldown(panel) {
    this.drillKey = panel.value;
    this.drillTrials = panel.trials;
    document.getElementById('grid').style.display = 'none';
    document.getElementById('drill').classList.add('active');
    document.getElementById('drillTitle').textContent =
      `${this.rastsBy} = ${this.formatValue(panel.value)}`;
    document.getElementById('drillMeta').textContent =
      `${panel.trials.length} trials · aligned to ${this.alignTo}`;
    this.renderDrilldown();
  },
  exitDrilldown() {
    this.drillKey = null;
    this.drillTrials = null;
    document.getElementById('drill').classList.remove('active');
    document.getElementById('grid').style.display = 'grid';
  },
  renderDrilldown() {
    if (this.drillTrials == null) return;
    const dg = this.dg;
    const trials = this.drillTrials;
    const canvas = document.getElementById('drillCanvas');
    const wrap = canvas.parentElement;
    const cssW = wrap.clientWidth - 20;
    const ROW_H = 36;
    const HEAD_H = 22, FOOT_H = 22;
    const cssH = HEAD_H + FOOT_H + ROW_H * trials.length;

    canvas.style.width  = cssW + 'px';
    canvas.style.height = cssH + 'px';
    canvas.width  = cssW * this.dpr;
    canvas.height = cssH * this.dpr;
    const ctx = canvas.getContext('2d');
    ctx.setTransform(this.dpr, 0, 0, this.dpr, 0, 0);

    const m = { t: HEAD_H, r: 12, b: FOOT_H, l: 60 };
    const pW = cssW - m.l - m.r;
    const tMin = this.winPre, tMax = this.winPost;
    const dLo = this.depthLo, dHi = this.depthHi;
    const dRange = (dHi - dLo) || 1;
    const miss = this.spikeMissing;
    const toX  = t => m.l + ((t - tMin) / (tMax - tMin)) * pW;

    ctx.fillStyle = '#0a0e17';
    ctx.fillRect(m.l, m.t, pW, ROW_H * trials.length);

    // Zebra striping (matches matrix-mode trial rows)
    ctx.fillStyle = 'rgba(91,164,245,0.10)';
    for (let ti = 0; ti < trials.length; ti++) {
      if (ti % 2 === 1) ctx.fillRect(m.l, m.t + ti * ROW_H, pW, ROW_H);
    }

    // Vertical grid lines: 0 (event), and a few ticks
    const ticks = this.niceTicks(tMin, tMax, 8);
    ctx.strokeStyle = '#1a2236';
    ctx.lineWidth = 1;
    for (const t of ticks) {
      ctx.beginPath();
      ctx.moveTo(toX(t), m.t);
      ctx.lineTo(toX(t), m.t + ROW_H * trials.length);
      ctx.stroke();
    }
    // event line
    if (0 >= tMin && 0 <= tMax) {
      ctx.strokeStyle = 'rgba(251,191,36,0.5)';
      ctx.setLineDash([2, 2]);
      ctx.beginPath();
      ctx.moveTo(toX(0), m.t);
      ctx.lineTo(toX(0), m.t + ROW_H * trials.length);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // Trial rows: each is a (time × depth) micro-strip
    const alignCol = dg.getList(this.alignTo);
    const srcCol = dg.getList('spike_src_trial');
    const alignData = alignCol && alignCol.data;
    const srcData = srcCol && srcCol.data;
    if (!alignData || !srcData) return;

    ctx.strokeStyle = 'rgba(229,231,235,0.55)';
    ctx.lineWidth = 1;
    ctx.beginPath();

    for (let ti = 0; ti < trials.length; ti++) {
      const trialIdx = trials[ti];
      const rowY0 = m.t + ti * ROW_H + 2;
      const rowY1 = m.t + (ti + 1) * ROW_H - 2;
      const rH = rowY1 - rowY0;
      const toYd = d => rowY0 + ((dHi - d) / dRange) * rH;

      const src = Number(srcData[trialIdx]) | 0;
      const spkT = getSublistData(dg, 'spike_times', src);
      const spkD = getSublistData(dg, 'spike_depth', src);
      if (!spkT) continue;
      const align = Number(alignData[trialIdx]);
      if (!Number.isFinite(align)) continue;

      for (let k = 0; k < spkT.length; k++) {
        const at = spkT[k] - align;
        if (at < tMin || at > tMax) continue;
        const d = spkD[k];
        if (d <= miss) continue;
        if (d < dLo || d > dHi) continue;
        const x = toX(at), y = toYd(d);
        ctx.moveTo(x, y - 0.6);
        ctx.lineTo(x, y + 0.6);
      }
    }
    ctx.stroke();

    // Row separators + trial-index labels
    ctx.fillStyle = '#5a6b85';
    ctx.font = '10px "JetBrains Mono"';
    ctx.textAlign = 'right';
    for (let ti = 0; ti < trials.length; ti++) {
      const rowY = m.t + ti * ROW_H;
      if (ti > 0) {
        ctx.strokeStyle = 'rgba(42,54,84,0.5)';
        ctx.beginPath();
        ctx.moveTo(m.l, rowY);
        ctx.lineTo(m.l + pW, rowY);
        ctx.stroke();
      }
      ctx.fillText(`#${trials[ti]}`, m.l - 4, rowY + ROW_H / 2 + 4);
    }
    // Outer border
    ctx.strokeStyle = '#2a3654';
    ctx.strokeRect(m.l, m.t, pW, ROW_H * trials.length);

    // Time axis at bottom
    ctx.fillStyle = '#5a6b85';
    ctx.font = '10px "JetBrains Mono"';
    ctx.textAlign = 'center';
    for (const t of ticks) {
      ctx.fillText(`${t}`, toX(t), m.t + ROW_H * trials.length + 14);
    }
    ctx.textAlign = 'right';
    ctx.fillText(`time vs ${this.alignTo} (ms)`, m.l + pW, m.t - 6);
    ctx.textAlign = 'left';
    ctx.fillText(`depth ${dLo}–${dHi} µm`, m.l, m.t - 6);
  },

  // Simple "nice" tick generator
  niceTicks(min, max, n) {
    const range = max - min; if (range <= 0) return [min];
    const rough = range / n, pow = Math.floor(Math.log10(rough)), base = Math.pow(10, pow);
    let step;
    if (rough / base < 1.5) step = base;
    else if (rough / base < 3.5) step = base * 2;
    else if (rough / base < 7.5) step = base * 5;
    else step = base * 10;
    const ticks = [];
    let t = Math.ceil(min / step) * step;
    while (t <= max) { ticks.push(Math.round(t)); t += step; }
    return ticks;
  },
};

App.init();
</script>
</body>
</html>
