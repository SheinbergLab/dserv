# extio-rw612 base config. Kept minimal; each building block adds its subsystem
# (USB-HS device, Ethernet+PTP/gPTP, BLE, GAU ADC, settings/flash persistence).

CONFIG_PRINTK=y
CONFIG_CBPRINTF_FP_SUPPORT=n

# block #3: box_gpio -- DO/DI via devicetree hsgpio0, box-timed pulse via a
# hardware CTIMER through the Zephyr counter API.
CONFIG_GPIO=y
CONFIG_COUNTER=y

# block #4: USB-HS CDC transport. device_next stack (HS-capable via the EHCI
# udc_mcux driver -> preserves the RW612 High-Speed bandwidth advantage), CDC-ACM
# frame pipe + console, interrupt-driven UART + DTR line control.
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_USBD_CDC_ACM_CLASS=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_LINE_CTRL=y
CONFIG_RING_BUFFER=y
CONFIG_HWINFO=y            # USB serial number derived from the device HWID
# block #5: Ethernet + hardware PTP. The FRDM board wires ENET + a KSZ8081 PHY
# (RMII) and the MAC carries the 1588 clock, so this is stack + transport only.
CONFIG_NETWORKING=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_ETH_NXP_ENET=y
CONFIG_NET_IPV4=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_PTP_CLOCK=y
CONFIG_PTP_CLOCK_NXP_ENET=y   # instantiate the ENET 1588 clock device
CONFIG_NET_PKT_TIMESTAMP=y
# the net stack needs more main-thread stack
CONFIG_MAIN_STACK_SIZE=4096

# block #6: multi-peripheral BLE central (frozen d5e7000x pipe). RW612 tri-radio.
CONFIG_BT=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_OBSERVER=y
CONFIG_BT_GATT_CLIENT=y
CONFIG_BT_MAX_CONN=8
CONFIG_BT_MAX_PAIRED=8
CONFIG_BT_SMP=y
CONFIG_BT_L2CAP_TX_MTU=131
CONFIG_BT_BUF_ACL_RX_SIZE=135
CONFIG_BT_BUF_ACL_TX_SIZE=135
CONFIG_BT_DATA_LEN_UPDATE=y

# CONFIG_ADC=y             # block #7: GAU GPADC vs external MCP3204
# CONFIG_SETTINGS=y        # persistence backend for box_persist
