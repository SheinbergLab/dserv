# Teensy 4.1 (i.MX RT1062) -- the WIRED test system.
#
# Ethernet + hardware PTP through the SAME Zephyr drivers as the RW612
# (`nxp,enet` + `nxp,enet-ptp-clock`); the board DTS already enables ENET with a
# ti,dp83825 PHY over RMII -- add a magjack. This is the direct comparison
# against the W6300+Pico2 box: native IP stack vs hardware TCP offload.
#
# No radio on Teensy -> no CONFIG_BT (block #6's BLE ingress is compiled out).

CONFIG_NETWORKING=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_ETH_NXP_ENET=y
CONFIG_NET_IPV4=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_PTP_CLOCK=y
CONFIG_PTP_CLOCK_NXP_ENET=y
CONFIG_NET_PKT_TIMESTAMP=y
