# Teensy 4.1 (i.MX RT1062) -- the WIRED test system.
#
# Ethernet + hardware PTP through the SAME Zephyr drivers as the RW612
# (`nxp,enet` + `nxp,enet-ptp-clock`); the board DTS already enables ENET with a
# ti,dp83825 PHY over RMII -- add a magjack. This is the direct comparison
# against the W6300+Pico2 box: native IP stack vs hardware TCP offload.
#
# No radio on Teensy -> no CONFIG_BT (block #6's BLE ingress is compiled out).

CONFIG_NETWORKING=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_ETH_NXP_ENET=y
CONFIG_NET_IPV4=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_PTP_CLOCK=y
CONFIG_PTP_CLOCK_NXP_ENET=y
CONFIG_NET_PKT_TIMESTAMP=y

# SD-card persistence (box_flash_sd) is DISABLED: the Zephyr usdhc/SD stack
# hard-faults at driver init on the Teensy 4.1 (box stops enumerating), the
# second immature Teensy peripheral after FlexSPI-flash-write. The backend code
# stays (src/platform/box_flash_sd.c, gated on CONFIG_FILE_SYSTEM); re-enable to
# investigate. Persistence is validated on the RW612 (NVS) instead.
# CONFIG_DISK_ACCESS=y
# CONFIG_DISK_DRIVER_SDMMC=y
# CONFIG_SDHC=y
# CONFIG_SDMMC_STACK=y
# CONFIG_FILE_SYSTEM=y
# CONFIG_FAT_FILESYSTEM_ELM=y
