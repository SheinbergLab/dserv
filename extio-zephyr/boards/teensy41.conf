# Teensy 4.1 (i.MX RT1062) -- the WIRED test system.
#
# Ethernet + hardware PTP through the SAME Zephyr drivers as the RW612
# (`nxp,enet` + `nxp,enet-ptp-clock`); the board DTS already enables ENET with a
# ti,dp83825 PHY over RMII -- add a magjack. This is the direct comparison
# against the W6300+Pico2 box: native IP stack vs hardware TCP offload.
#
# No radio on Teensy -> no CONFIG_BT (block #6's BLE ingress is compiled out).

CONFIG_NETWORKING=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_ETH_NXP_ENET=y
CONFIG_NET_IPV4=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_PTP_CLOCK=y
CONFIG_PTP_CLOCK_NXP_ENET=y
CONFIG_NET_PKT_TIMESTAMP=y

# Persistence: NVS on the on-board QSPI flash -- NO SD CARD REQUIRED.
# Both backends were validated on hardware 2026-07-23 (see PORTING.md); NVS is
# the default because it needs no card, works on teensy40 too, and exercises the
# SAME box_flash.c the RW612 will use -- bench-testing the target's code path
# rather than a Teensy-only variant. CMake picks NVS over SD (if(CONFIG_NVS) ...
# elseif(CONFIG_FILE_SYSTEM)), and boards/teensy41.overlay carves the
# storage_partition NVS needs. The SD backend (box_flash_sd.c) stays in the tree;
# to use it instead, drop CONFIG_NVS and enable CONFIG_DISK_ACCESS +
# CONFIG_DISK_DRIVERS (BOTH -- Kconfig.sdmmc is sourced inside `if DISK_DRIVERS`,
# so DISK_DRIVER_SDMMC alone is inert) + SDHC + SDMMC_STACK + FILE_SYSTEM +
# FAT_FILESYSTEM_ELM.
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y

# Zephyr's fatal-error handler prints through LOG_ERR, so WITHOUT logging a hard
# fault produces NOTHING on the console -- which is why the original crash was
# invisible. Minimal mode keeps it usable during early boot.
CONFIG_LOG=y
CONFIG_LOG_MODE_MINIMAL=y
# ERRORS ONLY. LOG_MODE_MINIMAL is SYNCHRONOUS -- each line blocks the calling
# thread until it is out of lpuart6 at 115200. At the default INFO level the
# CDC-ACM driver logs every UART operation (~86 KB / 55 s = ~7.5 s of solid UART
# time), which visibly stalls the box and the console. Level 1 keeps the E: fault
# dumps (the whole point) with no traffic when nothing is wrong; the CDC-ACM
# class is silenced outright since it is the chatty one.
CONFIG_LOG_DEFAULT_LEVEL=1
CONFIG_USBD_CDC_ACM_LOG_LEVEL_OFF=y

# THE "SD hard-fault" WAS OURS, not a Teensy/Zephyr driver bug: with the boot log
# visible it is a plain MAIN-THREAD STACK OVERFLOW (MPU fault, pc/xpsr full of
# Zephyr's 0xaa stack-fill sentinel). box_flash_init() mounts FATFS from main(),
# and the FATFS + disk + SDMMC path puts sector buffers and filesystem structs on
# the caller's stack -- far more than the common 4096 default.
CONFIG_MAIN_STACK_SIZE=8192
