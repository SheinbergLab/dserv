# Teensy 4.0 (i.MX RT1062) -- the USB-ONLY test system.
#
# No Ethernet PHY and no radio on this board, so neither the networking stack
# (block #5) nor BLE (block #6) is enabled: the uplink arbiter falls back to
# USB, which is the point. RT1062 USB is High-Speed, making this a clean A/B
# against the Pico 2's USB Full-Speed transport (480 Mbps vs 12 Mbps).
#
# Persistence: NVS on the on-board QSPI flash (boards/teensy40.overlay carves the
# storage_partition). Same backend the RW612 will use, so the bench exercises the
# target's code path.
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y

# NOT OPTIONAL with NVS: box_flash_init() mounts from main(), and 4096 is exactly
# what overflowed the main stack on the teensy41 -- an MPU fault that read as
# "immature Teensy peripheral support" for a long time. See PORTING.md.
CONFIG_MAIN_STACK_SIZE=8192
