# FRDM-RW612 -- the universal hub: Ethernet+PTP AND the BLE fleet radio.

# block #5: Ethernet + hardware PTP. The board wires ENET + a KSZ8081 PHY (RMII)
# and the MAC carries the 1588 clock, so this is stack + transport only.
CONFIG_NETWORKING=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_ETH_NXP_ENET=y
CONFIG_NET_IPV4=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_PTP_CLOCK=y
CONFIG_PTP_CLOCK_NXP_ENET=y   # instantiate the ENET 1588 clock device
CONFIG_NET_PKT_TIMESTAMP=y

# block #6: multi-peripheral BLE central (frozen d5e7000x pipe). RW612 tri-radio.
# NOTE: needs `west blobs fetch hal_nxp` (accept NXP's controller firmware
# license) or the build fails on the missing signed cpu2/NBU image.
CONFIG_BT=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_OBSERVER=y
CONFIG_BT_GATT_CLIENT=y
CONFIG_BT_MAX_CONN=8
CONFIG_BT_MAX_PAIRED=8
CONFIG_BT_SMP=y
CONFIG_BT_L2CAP_TX_MTU=131
CONFIG_BT_BUF_ACL_RX_SIZE=135
CONFIG_BT_BUF_ACL_TX_SIZE=135
CONFIG_BT_DATA_LEN_UPDATE=y
