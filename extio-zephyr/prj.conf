# extio-zephyr -- COMMON config for every supported board.
# Board-specific subsystems live in boards/<board>.conf (auto-merged by Zephyr):
#   frdm_rw612 -> Ethernet+PTP + BLE      (the universal hub)
#   teensy41   -> Ethernet+PTP, no radio  (wired test system)
#   teensy40   -> USB only                (USB-HS test system)

CONFIG_PRINTK=y
CONFIG_CBPRINTF_FP_SUPPORT=n

# block #3: box_gpio -- DO/DI via the box-gpio-port alias (set per board).
# Box-timed pulses + scheduled events ride k_timer (100 us tick, see
# CONFIG_SYS_CLOCK_TICKS_PER_SEC) -- NOT the counter API; the mcux GPT counter
# driver fires stale alarms instantly (PORTING.md).
CONFIG_REBOOT=y          # cmd/reboot -> warm reset (portable)
CONFIG_GPIO=y

# block #4: USB-HS CDC transport. device_next stack (High-Speed on both the
# RW612 and the RT1062), CDC-ACM frame pipe + console, irq-driven UART + DTR.
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_USBD_CDC_ACM_CLASS=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_LINE_CTRL=y
CONFIG_RING_BUFFER=y
CONFIG_HWINFO=y            # USB serial number derived from the device HWID
# NOTE: the CDC-ACM "echo mitigation" first-TX delay (USBD_CDC_ACM_TX_DELAY_MS)
# is left at its upstream 100 ms default ON PURPOSE -- see the app Kconfig for
# why zeroing it produced a host-echo feedback storm on the console CDC.
# (Tried CONFIG_USBD_CDC_ACM_WORKQUEUE=y for data-vs-console contention -- did not
# fix it, so not enabled.)

# Management console = Zephyr's Shell on the console CDC (chosen zephyr,shell-uart
# in each board overlay); box_cli's grammar is registered as shell commands, so
# the wire-level command surface is identical to the Pico box.
#
# All buffer sizes are left at their UPSTREAM DEFAULTS on purpose. An earlier
# revision raised the backend TX ring (8 -> 2048), RX ring, and print chunk to
# chase byte-shredding on the console CDC. That was symptom-chasing: the stock
# Zephyr shell sample (samples/subsys/shell/shell_module + usb.overlay), built
# untouched with those very defaults, reproduces the SAME shredding and drops on
# the Teensy 4.1 -- see the console note in README.md. The defaults are fine; the
# fault is below us, in device_next CDC-ACM / the RT1062 UDC driver.
CONFIG_SHELL=y
CONFIG_SHELL_STACK_SIZE=4096
CONFIG_SHELL_PROMPT_UART="extio> "

# Canonical for a shell on USB CDC-ACM (the stock usb.overlay sample sets it):
# don't transmit until the host has actually opened the port (DTR asserted).
# Correct practice regardless -- it is NOT a fix for the RT1062 issue above.
CONFIG_SHELL_BACKEND_SERIAL_CHECK_DTR=y

# headroom for the net stack where it is enabled; harmless otherwise
CONFIG_MAIN_STACK_SIZE=4096

# Persistent settings (box_flash, NVS) are enabled PER BOARD, not here: on the
# Teensy the app XIP-executes from its only flash, and enabling the FlexSPI NOR
# driver re-inits that controller and hard-faults at boot. So NVS lives in
# boards/frdm_rw612.conf (separate storage, no XIP conflict). A Teensy build
# runs without persistence until a working XIP-safe recipe is found.

# CONFIG_ADC=y             # block #7: GAU GPADC vs external MCP3204
# CONFIG_SETTINGS=y        # persistence backend for box_persist
