# extio-zephyr -- COMMON config for every supported board.
# Board-specific subsystems live in boards/<board>.conf (auto-merged by Zephyr):
#   frdm_rw612 -> Ethernet+PTP + BLE      (the universal hub)
#   teensy41   -> Ethernet+PTP, no radio  (wired test system)
#   teensy40   -> USB only                (USB-HS test system)

CONFIG_PRINTK=y
CONFIG_CBPRINTF_FP_SUPPORT=n

# block #3: box_gpio -- DO/DI via the box-gpio-port alias, box-timed pulse on a
# hardware counter via the box-pulse-counter alias (both set per board).
CONFIG_REBOOT=y          # cmd/reboot -> warm reset (portable)
CONFIG_GPIO=y
CONFIG_COUNTER=y

# block #4: USB-HS CDC transport. device_next stack (High-Speed on both the
# RW612 and the RT1062), CDC-ACM frame pipe + console, irq-driven UART + DTR.
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_USBD_CDC_ACM_CLASS=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_LINE_CTRL=y
CONFIG_RING_BUFFER=y
CONFIG_HWINFO=y            # USB serial number derived from the device HWID

# headroom for the net stack where it is enabled; harmless otherwise
CONFIG_MAIN_STACK_SIZE=4096

# Persistent settings (box_flash, NVS) are enabled PER BOARD, not here: on the
# Teensy the app XIP-executes from its only flash, and enabling the FlexSPI NOR
# driver re-inits that controller and hard-faults at boot. So NVS lives in
# boards/frdm_rw612.conf (separate storage, no XIP conflict). A Teensy build
# runs without persistence until a working XIP-safe recipe is found.

# CONFIG_ADC=y             # block #7: GAU GPADC vs external MCP3204
# CONFIG_SETTINGS=y        # persistence backend for box_persist
